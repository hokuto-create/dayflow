function getWeekDates(baseDate) {
  const d = new Date(baseDate);
  const day = d.getDay();
  const mon = new Date(d);
  mon.setDate(d.getDate() - ((day + 6) % 7));
  return Array.from({ length: 7 }, (_, i) => {
    const x = new Date(mon);
    x.setDate(mon.getDate() + i);
    return x.toISOString().split("T")[0];
  });
}

function addDays(dateStr, n) {
  const d = new Date(dateStr);
  d.setDate(d.getDate() + n);
  return d.toISOString().split("T")[0];
}

// Build a task title from a subject TODO. For non-CPA (material) subjects we
// prepend the subject/textbook name, matching SubjectsView.taskTitleFor.
function buildTaskTitle(todo, subjects) {
  const subj = subjects.find(s => s.id === todo.subjectId);
  if (subj && subj.category && subj.category !== "CPAеЛЙеЉЈ") {
    return `${subj.name} ${todo.text}`;
  }
  return todo.text;
}

// Active study days in [startStr, endStr] whose weekday is in `weekdays` (a Set
// of 0=Sun..6=Sat). Used by deadline-mode auto-distribution.
function activeDaysBetween(startStr, endStr, weekdays) {
  const out = [];
  let d = startStr, guard = 0;
  while (d <= endStr && guard++ < 3660) {
    if (weekdays.has(new Date(d + "T00:00:00").getDay())) out.push(d);
    d = addDays(d, 1);
  }
  return out;
}

// The k-th (0-indexed) active day on/after startStr matching `weekdays`.
// Used by hours-per-day mode where the end date is open-ended.
function nthActiveDay(startStr, weekdays, k) {
  let d = startStr, count = 0, guard = 0;
  while (guard++ < 3660) {
    if (weekdays.has(new Date(d + "T00:00:00").getDay())) {
      if (count === k) return d;
      count++;
    }
    d = addDays(d, 1);
  }
  return d;
}

let _rcSeq = 100000; // CPAгВЈгГЉгГЙ(_todoSeq)гБ®еНБеИЖйЫҐгБЧгБЯйА£зХ™
function buildRedChartTodos(books, sogo) {
  const out = [];
  books.forEach(book => {
    let exNo = 0; // дЊЛй°МзХ™еПЈпЉИжХЩжЭРгБФгБ®гБЃйАЪгБЧзХ™еПЈпЉЙ
    book.chapters.forEach((ch, ci) => {
      const parentId = `${book.id}_ch${ci + 1}`;
      out.push({
        id: parentId, subjectId: book.id,
        text: `зђђ${ci + 1}зЂ† ${ch.title}`,
        minutes: null, status: "unwatched", done: false, createdAt: ++_rcSeq,
      });
      (ch.examples || []).forEach(sub => {
        exNo++;
        out.push({
          id: genId(), subjectId: book.id, parentId,
          text: `дЊЛй°М${exNo} ${sub}`,
          minutes: null, status: "unwatched", done: false, createdAt: ++_rcSeq,
        });
      });
    });
    // жЉФзњТеХПй°МпЉИеЕ®зЂ†гБЃеЊМгБЂеПЦгВКзµДгВАзЛђзЂЛTODOпЉЙ
    if (book.exercises) {
      const exParentId = `${book.id}_exercises`;
      out.push({
        id: exParentId, subjectId: book.id,
        text: `жЉФзњТеХПй°МпЉИеЕ®${book.exercises}еХПпЉЙ`,
        minutes: null, status: "unwatched", done: false, createdAt: ++_rcSeq,
      });
      for (let i = 1; i <= book.exercises; i++) {
        out.push({
          id: genId(), subjectId: book.id, parentId: exParentId,
          text: `жЉФзњТеХПй°М${i}`,
          minutes: null, status: "unwatched", done: false, createdAt: ++_rcSeq,
        });
      }
    }
  });
  // зЈПеРИжЉФзњТ
  (sogo || []).forEach(sg => {
    // items гБѓеРДеХПй°М/дЄїй°МгБЃгВµгГЦгВњгВ§гГИгГЂйЕНеИЧгАВй°Юй°МпЉИзђђ1йГ®пЉЙгГїи©¶зЈіпЉИзђђ2йГ®пЉЙгБѓ
    // 1еѓЊ1гБІдїШгБПгБЯгВБгАБдЊЛй°МгБ®зЈізњТгБ®еРМжІШгБЂгГЪгВҐгБІеПЦгВКзµДгВАпЉИеАЛеИ•TODOгБЂгБѓгБЧгБ™гБДпЉЙгАВ
    const mkPart = (partNo, label, items, itemLabel) => {
      if (!items || !items.length) return;
      const pId = `${sg.attach}_sogo_p${partNo}`;
      out.push({
        id: pId, subjectId: sg.attach,
        text: `зЈПеРИжЉФзњТпЉИ${sg.label}пЉЙзђђ${partNo}йГ® ${label}пЉИеЕ®${items.length}еХПпЉЙ`,
        minutes: null, status: "unwatched", done: false, createdAt: ++_rcSeq,
      });
      items.forEach((sub, i) => {
        out.push({
          id: genId(), subjectId: sg.attach, parentId: pId,
          text: `${itemLabel}${i + 1} ${sub}`,
          minutes: null, status: "unwatched", done: false, createdAt: ++_rcSeq,
        });
      });
    };
    mkPart(1, "еХПй°М", sg.part1, "еХПй°М");
    mkPart(2, "дЄїй°М", sg.part2, "дЄїй°М");
  });
  return out;
}

// иµ§гГБгГ£гГЉгГИгБЃTODOпЉИзЂ†пЉЭи¶™гАБдЊЛй°МпЉЭе≠РпЉЙгАВгВЈгГЉгГЙеЕЉгГЮгВ§гВ∞гГђгГЉгВЈгГІгГ≥зФ®гБЂеРНеЙНдїШгБНгБІдњЭжМБгАВ
const RED_CHART_TODOS = buildRedChartTodos(RED_CHART_BOOKS, RED_CHART_SOGO);

// жЦ∞и¶ПгВ§гГ≥гВєгГИгГЉгГЂзФ®гВЈгГЉгГЙгБЂеПНжШ†
SAMPLE_SUBJECTS.push(...RED_CHART_SUBJECTS);
SAMPLE_SUBJECT_TODOS.push(...RED_CHART_TODOS);

// жЧҐе≠ШгГЗгГЉгВњпЉИlocalStorage / гВѓгГ©гВ¶гГЙеРМжЬЯжЄИгБњпЉЙгБЂиµ§гГБгГ£гГЉгГИгБЃдЄНиґ≥еИЖгБ†гБСгВТињљи®ШгБЩгВЛгГЮгВ§гВ∞гГђгГЉгВЈгГІгГ≥гАВ
// гГїжЧҐе≠ШгБЃйА≤жНЧ(status/done)гВДдїЦгГЗгГЉгВњгБѓдЄАеИЗе§ЙжЫігБЧгБ™гБДпЉИзіФз≤ЛгБЂињљеК†гБЃгБњпЉЙгАВ
// гГїжХЩжЭРгБѓ idгАБTODOгБѓгАМsubjectId|textгАНгВТгВ≠гГЉгБЂйЗНи§ЗеИ§еЃЪгБЩгВЛгБЯгВБгАБ
//   еЊМгБЛгВЙдЊЛй°МгВТињљи®ШгБЧгБ¶гВВжђ°еЫЮиµЈеЛХжЩВгБЂдЄНиґ≥еИЖгБМиЗ™еЛХгБІиґ≥гБХгВМгВЛгАВ
function mergeRedChart({ subjects, subjectTodos, subjectCategories }) {
  const subjOut = [...subjects];
  RED_CHART_SUBJECTS.forEach(s => {
    if (!subjOut.some(x => x.id === s.id)) subjOut.push(s);
  });
  const existingKeys = new Set(
    subjectTodos
      .filter(t => t.subjectId && t.subjectId.startsWith("rc_"))
      .map(t => `${t.subjectId}|${t.text}`)
  );
  const toAdd = RED_CHART_TODOS.filter(t => !existingKeys.has(`${t.subjectId}|${t.text}`));
  const todoOut = toAdd.length ? [...subjectTodos, ...toAdd] : subjectTodos;
  const catOut = (subjectCategories || []).includes("иґ£еС≥еЛЙеЉЈ")
    ? subjectCategories
    : [...(subjectCategories || []), "иґ£еС≥еЛЙеЉЈ"];
  return {
    subjects: subjOut,
    subjectTodos: todoOut,
    subjectCategories: catOut,
    added: toAdd.length,
    addedSubjects: RED_CHART_SUBJECTS.filter(s => !subjects.some(x => x.id === s.id)).length,
  };
}

function DayView({ tasks, setTasks, selectedDate, setSelectedDate, goals, subjects, subjectTodos, setSubjectTodos, settings }) {
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ title: "", date: selectedDate, hour: 9, duration: 1, priority: "medium", note: "", goalId: "", kind: "study" });
  const [editId, setEditId] = useState(null);
  const [extraDates, setExtraDates] = useState([]); // additional dates for bulk add
  const [showBulk, setShowBulk] = useState(false);
  const [understandingModal, setUnderstandingModal] = useState(null); // task being completed
  const [scheduleModal, setScheduleModal] = useState(null); // unscheduled task to schedule
  const [hourPickerOpen, setHourPickerOpen] = useState(false); // grid picker for form's start time
  const [examplesModal, setExamplesModal] = useState(null); // task whose examples (children) to show
  const [confirmDeleteTask, setConfirmDeleteTask] = useState(null);
  const [durationEditId, setDurationEditId] = useState(null);
  const askDeleteTask = (id) => {
    if (confirmDeleteTask === id) {
      deleteTask(id);
      setConfirmDeleteTask(null);
    } else {
      setConfirmDeleteTask(id);
      setTimeout(() => setConfirmDeleteTask(cd => cd === id ? null : cd), 3000);
    }
  };

  const dayTasks = tasks.filter(t => t.date === selectedDate && t.hour != null).sort((a, b) => a.hour - b.hour);
  const unscheduledTasks = tasks.filter(t => t.date === selectedDate && t.hour == null);

  const saveTask = () => {
    if (!form.title.trim()) return;
    if (editId) {
      setTasks(ts => ts.map(t => t.id === editId ? { ...t, ...form } : t));
      setEditId(null);
    } else {
      // Bulk add: main date + extraDates
      const dates = [form.date, ...extraDates].filter((d, i, a) => a.indexOf(d) === i);
      const { date: _d, ...rest } = form;
      const newTasks = dates.map(d => ({ id: genId(), done: false, actual: null, ...rest, date: d }));
      setTasks(ts => [...ts, ...newTasks]);
    }
    setForm({ title: "", date: selectedDate, hour: 9, duration: 1, priority: "medium", note: "", goalId: "", kind: "study" });
    setExtraDates([]);
    setShowBulk(false);
    setShowForm(false);
  };

  const deleteTask = (id) => setTasks(ts => ts.filter(t => t.id !== id));

  // Days until next review based on understanding (1-4)
  const REVIEW_DAYS = { 1: 1, 2: 3, 3: 7, 4: null }; // 4=вЧО no review needed

  const completeWithUnderstanding = (task, level) => {
    // Mark task done
    setTasks(ts => ts.map(t => t.id === task.id ? { ...t, done: true, understanding: level } : t));
    // Sync subject TODO
    if (task.subjectTodoId) {
      setSubjectTodos(sts => sts.map(s => s.id === task.subjectTodoId
        ? { ...s, status: "done", done: true, understanding: level } : s));
    }
    // Schedule review task if not perfect
    const days = REVIEW_DAYS[level];
    if (days && task.kind !== "other") {
      const reviewDate = addDays(task.date, days);
      const reviewTitle = task.title.startsWith("еЊ©зњТ: ") ? task.title : `еЊ©зњТ: ${task.title}`;
      // For review, use the underlying TODO's own minutes (likely short, e.g. 5min for an example)
      // Otherwise fall back to capping the original task duration at 1h
      let reviewDur = Math.min(task.duration, 1);
      if (task.subjectTodoId) {
        const todo = subjectTodos.find(x => x.id === task.subjectTodoId);
        if (todo && todo.minutes) {
          reviewDur = Math.max(1/60, todo.minutes / 60);
        }
      }
      setTasks(ts => [...ts, {
        id: genId(), date: reviewDate, title: reviewTitle,
        hour: null, duration: reviewDur,
        priority: level === 1 ? "high" : level === 2 ? "medium" : "low",
        actual: null, done: false, note: "", goalId: task.goalId,
        kind: "study", subjectId: task.subjectId, subjectTodoId: task.subjectTodoId,
        isReview: true, reviewOf: task.id,
      }]);
    }
    setUnderstandingModal(null);
  };

  // For a review task, derive the textbook (TX) label from its source todo.
  // Example problems (дЊЛй°М) are stored as children of a TX chapter and don't
  // carry the TX number in their own title, so we inherit it from the parent
  // chapter's text (e.g. "TX5-1 жЬђжФѓеЇЧдЉЪи®И" вЖТ "tx5"). Returns null for
  // non-review tasks, when no source todo is found, or when the title already
  // shows the TX number (so normal chapter reviews are left untouched).
  const reviewTxLabel = (task) => {
    if (!task.isReview || !task.subjectTodoId) return null;
    const todo = subjectTodos.find(s => s.id === task.subjectTodoId);
    if (!todo) return null;
    const source = todo.parentId ? subjectTodos.find(s => s.id === todo.parentId) : todo;
    const text = (source && source.text) || todo.text || "";
    const m = text.match(/TX\s*(\d+)/i);
    if (!m) return null;
    if (task.title.toLowerCase().includes(`tx${m[1]}`)) return null;
    return `tx${m[1]}`;
  };

  const toggleDone = (task) => {
    // If unchecking, just uncheck
    if (task.done) {
      setTasks(ts => ts.map(t => t.id === task.id ? { ...t, done: false } : t));
      return;
    }
    // If non-study, just check
    if (task.kind === "other") {
      setTasks(ts => ts.map(t => t.id === task.id ? { ...t, done: true } : t));
      return;
    }
    // Open understanding modal
    setUnderstandingModal(task);
  };

  const startEdit = (t) => {
    setForm({ title: t.title, date: t.date, hour: t.hour, duration: t.duration, priority: t.priority, note: t.note || "", goalId: t.goalId || "", kind: t.kind || "study" });
    setEditId(t.id);
    setExtraDates([]);
    setShowBulk(false);
    setShowForm(true);
  };

  const priorityColor = { high: C.red, medium: C.yellow, low: C.green };
  const priorityLabel = { high: "йЂШ", medium: "дЄ≠", low: "дљО" };

  const startH = settings?.dayStartHour ?? 5;
  const endH = settings?.dayEndHour ?? 26;
  const hours = Array.from({ length: endH - startH }, (_, i) => i + startH);

  return (
    <div style={{ padding: 16, maxWidth: 600, margin: "0 auto" }}>
      {/* Date selector */}
      <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 8 }}>
        <button onClick={() => setSelectedDate(addDays(selectedDate, -7))} style={{ ...btn(), padding: "5px 8px", fontSize: 11 }}>вАєвАє 1йА±</button>
        <button onClick={() => setSelectedDate(addDays(selectedDate, -1))} style={{ ...btn(), padding: "5px 10px" }}>вАє</button>
        <div style={{ flex: 1, textAlign: "center", cursor: "pointer", position: "relative" }}
          onClick={() => document.getElementById("date-jump")?.showPicker?.()}>
          <div style={{ fontFamily: serif, fontSize: 18, color: C.text }}>
            {(() => {
              const d = new Date(selectedDate + "T00:00:00");
              const isCurYear = d.getFullYear() === new Date().getFullYear();
              return isCurYear
                ? d.toLocaleDateString("ja-JP", { month: "long", day: "numeric" })
                : d.toLocaleDateString("ja-JP", { year: "numeric", month: "long", day: "numeric" });
            })()}
          </div>
          <div style={{ fontSize: 12, color: C.textMid }}>
            {DAYS_JA[new Date(selectedDate + "T00:00:00").getDay()]}жЫЬжЧ•
            {selectedDate === todayStr() && <span style={{ color: C.accent, marginLeft: 6 }}>вАҐ дїКжЧ•</span>}
          </div>
          <input id="date-jump" type="date" value={selectedDate}
            onChange={e => e.target.value && setSelectedDate(e.target.value)}
            style={{ position: "absolute", inset: 0, opacity: 0, cursor: "pointer", border: "none" }} />
        </div>
        <button onClick={() => setSelectedDate(addDays(selectedDate, 1))} style={{ ...btn(), padding: "5px 10px" }}>вАЇ</button>
        <button onClick={() => setSelectedDate(addDays(selectedDate, 7))} style={{ ...btn(), padding: "5px 8px", fontSize: 11 }}>1йА± вАЇвАЇ</button>
      </div>

      {/* Quick jump bar */}
      <div style={{ display: "flex", gap: 5, marginBottom: 12, overflowX: "auto" }}>
        <button onClick={() => setSelectedDate(todayStr())} style={{ ...btn(selectedDate === todayStr(), C.accent, { fontSize: 11, padding: "4px 10px", whiteSpace: "nowrap" }) }}>дїКжЧ•</button>
        <button onClick={() => setSelectedDate(addDays(todayStr(), 1))} style={{ ...btn(false, C.textMid, { fontSize: 11, padding: "4px 10px", whiteSpace: "nowrap" }) }}>жШОжЧ•</button>
        <button onClick={() => setSelectedDate(addDays(todayStr(), 3))} style={{ ...btn(false, C.textMid, { fontSize: 11, padding: "4px 10px", whiteSpace: "nowrap" }) }}>3жЧ•еЊМ</button>
        <button onClick={() => setSelectedDate(addDays(todayStr(), 7))} style={{ ...btn(false, C.textMid, { fontSize: 11, padding: "4px 10px", whiteSpace: "nowrap" }) }}>1йА±йЦУеЊМ</button>
        <button onClick={() => setSelectedDate(addDays(todayStr(), 30))} style={{ ...btn(false, C.textMid, { fontSize: 11, padding: "4px 10px", whiteSpace: "nowrap" }) }}>1гГґжЬИеЊМ</button>

      </div>

      {/* Overdue reviews from previous days */}
      {(() => {
        const today = todayStr();
        if (selectedDate !== today) return null;
        const overdueReviews = tasks.filter(t => t.isReview && !t.done && t.date < today);

            </div>

              const subjData = t.subjectId && subjects.find(s => s.id === t.subjectId);

                {t.isReview && <span style={{ color: C.yellow, marginRight: 4 }}>рЯФБ</span>}{t.title}
              </div>
              {/* Duration adjuster */}
              <div style={{
                display: "flex", alignItems: "center", gap: 8,
                padding: "8px 10px", background: C.surfaceUp, borderRadius: 6, marginBottom: 10,
              }}>
                <span style={{ fontSize: 11, color: C.textMid }}>жЙАи¶БжЩВйЦУ:</span>
                <button onClick={() => adjustDur(-0.25)}
                  style={{ ...btn(false, C.textMid, { padding: "4px 10px", fontSize: 14, lineHeight: 1 }) }}>вИТ</button>
                <span style={{
                  fontSize: 13, fontWeight: 700, color: C.text,
                  minWidth: 70, textAlign: "center",
                }}>{fmtDur(t.duration)}</span>
                <button onClick={() => adjustDur(0.25)}
                  style={{ ...btn(false, C.textMid, { padding: "4px 10px", fontSize: 14, lineHeight: 1 }) }}>пЉЛ</button>
                {subjData && <span style={{ color: subjData.color, fontSize: 11, marginLeft: "auto" }}>рЯУЪ {subjData.name}</span>}
              </div>
              <div style={{ overflowY: "auto", display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 6 }}>
                {Array.from({ length: (endH - startH) * 4 }, (_, i) => startH + i * 0.25).map(h => {
                  const free = isFree(h, t.duration);
                  return (
                    <button key={h} disabled={!free}
                      onClick={() => {
                        setTasks(ts => ts.map(x => x.id === t.id ? { ...x, hour: h } : x));
                        setScheduleModal(null);

                      style={{
                        padding: "8px 4px", borderRadius: 6,
                        background: free ? C.surfaceUp : "#f3e6e6",
                        border: `1px solid ${free ? C.border : C.red + "40"}`,
                        color: free ? C.text : C.textDim,
                        fontFamily: font, fontSize: 12, fontWeight: 600,
                        cursor: free ? "pointer" : "not-allowed",

                      {fmtTime(h)}
                    </button>

              <button onClick={() => setScheduleModal(null)}
                style={{ ...btn(false, C.textMid, { width: "100%", marginTop: 12, padding: "8px" }) }}>

              </button>
            </div>
          </div>
        );
      })()}

      {/* Hour picker modal for form start time (grid UI like scheduleModal) */}
      {hourPickerOpen && (() => {
        // New overlap rule: any 15-min slot can hold at most 15 min total
        const SLOT = 0.25;
        const overlapInSlot = (taskStart, taskEnd, slotStart) => {
          const slotEnd = slotStart + SLOT;
          const a = Math.max(taskStart, slotStart);
          const b = Math.min(taskEnd, slotEnd);
          return Math.max(0, b - a);
        };
        const dur = form.duration || 0.5;
        const isFree = (h) => {
          const taskEnd = h + dur;
          const firstSlot = Math.floor(h / SLOT) * SLOT;
          for (let s = firstSlot; s < taskEnd; s += SLOT) {
            const existingInSlot = dayTasks
              .filter(x => x.id !== editId)
              .reduce((sum, x) => sum + overlapInSlot(x.hour, x.hour + x.duration, s), 0);
            const proposedInSlot = overlapInSlot(h, taskEnd, s);
            if (existingInSlot + proposedInSlot > SLOT + 0.0001) return false;
          }
          return true;
        };
        return (
          <div style={{
            position: "fixed", inset: 0, background: "#0008", zIndex: 110,
            display: "flex", alignItems: "center", justifyContent: "center", padding: 16,
          }} onClick={() => setHourPickerOpen(false)}>
            <div style={{
              ...card({ maxWidth: 380, width: "100%", maxHeight: "85vh", display: "flex", flexDirection: "column" })

              <div style={{ fontSize: 11, color: C.textMid, marginBottom: 12 }}>
                {fmtDur(form.duration)}
              </div>
              <div style={{ overflowY: "auto", display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 6 }}>
                {Array.from({ length: (endH - startH) * 4 }, (_, i) => startH + i * 0.25).map(h => {
                  const free = isFree(h);
                  const selected = form.hour === h;
                  return (
                    <button key={h} disabled={!free}
                      onClick={() => {
                        setForm(f => ({ ...f, hour: h }));
                        setHourPickerOpen(false);
                      }}
                      style={{
                        padding: "8px 4px", borderRadius: 6,
                        background: selected ? C.accent : free ? C.surfaceUp : "#f3e6e6",
                        border: `1px solid ${selected ? C.accent : free ? C.border : C.red + "40"}`,
                        color: selected ? "#fff" : free ? C.text : C.textDim,
                        fontFamily: font, fontSize: 12, fontWeight: 600,
                        cursor: free ? "pointer" : "not-allowed",
                      }}>
                      {fmtTime(h)}
                    </button>
                  );
                })}
              </div>
              <button onClick={() => setHourPickerOpen(false)}
                style={{ ...btn(false, C.textMid, { width: "100%", marginTop: 12, padding: "8px" }) }}>
                гВ≠гГ£гГ≥гВїгГЂ
              </button>
            </div>
          </div>
        );
      })()}

      {/* Examples (е≠РTODO) modal вАФ open when tapping a task linked to a subject TODO */}
      {examplesModal && (() => {
        const t = examplesModal;
        const parentTodo = subjectTodos.find(x => x.id === t.subjectTodoId);
        if (!parentTodo) {
          // Auto-close if parent not found
          return null;
        }
        const subjData = subjects.find(s => s.id === parentTodo.subjectId);
        const mMode = subjData && subjData.category && subjData.category !== "CPAеЛЙеЉЈ";
        const ML = mMode
          ? { unwatched: "жЬ™зЭАжЙЛ", done: "еЃМдЇЖ", progressLabel: "еПЦгВКзµДгБњ:" }
          : { unwatched: "жЬ™и¶ЦиБі", done: "и¶ЦиБіжЄИ", progressLabel: "еЛХзФї:" };
        const children = subjectTodos.filter(x => x.parentId === parentTodo.id)
          .sort((a, b) => a.createdAt - b.createdAt);
        const setChildStatus = (id, status) => {
          setSubjectTodos(ts => ts.map(x => x.id === id ? { ...x, status, done: status === "done" } : x));
        };
        const setChildUnderstanding = (id, level) => {
          setSubjectTodos(ts => ts.map(x => x.id === id
            ? { ...x, understanding: level, status: x.status === "unwatched" ? "reviewing" : x.status }
            : x));
        };
        const setParentStatus = (status) => {
          setSubjectTodos(ts => ts.map(x => x.id === parentTodo.id ? { ...x, status, done: status === "done" } : x));
        };
        const setParentUnderstanding = (level) => {
          setSubjectTodos(ts => ts.map(x => x.id === parentTodo.id
            ? { ...x, understanding: level, status: x.status === "unwatched" ? "reviewing" : x.status }
            : x));
        };
        const pst = parentTodo.status || (parentTodo.done ? "done" : "unwatched");
        const accent = subjData?.color || C.accent;
        return (
          <div style={{
            position: "fixed", inset: 0, background: "#0008", zIndex: 110,
            display: "flex", alignItems: "flex-end", justifyContent: "center",
          }} onClick={() => setExamplesModal(null)}>
            <div style={{
              background: C.surface, borderRadius: "12px 12px 0 0",
              maxWidth: 560, width: "100%", maxHeight: "85vh", display: "flex", flexDirection: "column",
              boxShadow: "0 -4px 20px #0003",
            }} onClick={e => e.stopPropagation()}>
              {/* Header */}
              <div style={{ padding: "16px 16px 12px", borderBottom: `1px solid ${C.border}` }}>
                <div style={{ display: "flex", alignItems: "flex-start", gap: 8 }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 11, color: C.textMid, marginBottom: 2 }}>
                      {fmtTime(t.hour)}гАЬ{fmtTime(t.hour + t.duration)}
                      {subjData && <span style={{ marginLeft: 8, color: accent, fontWeight: 700 }}>рЯУЪ {subjData.name}</span>}
                    </div>
                    <div style={{ fontSize: 16, fontWeight: 700, color: C.text }}>{parentTodo.text}</div>
                  </div>
                  <button onClick={() => setExamplesModal(null)}
                    style={{ ...btn(false, C.textMid, { padding: "4px 10px", fontSize: 12 }) }}>вЬХ</button>
                </div>
                {/* Parent video status */}
                <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 10, flexWrap: "wrap" }}>
                  <span style={{ fontSize: 11, color: C.textMid }}>{ML.progressLabel}</span>
                  {[
                    ["unwatched", ML.unwatched, C.textDim],
                    ["reviewing", "еЊ©зњТдЄ≠", C.yellow],
                    ["done", ML.done, accent],
                  ].map(([st, lbl, col]) => (
                    <button key={st} onClick={() => setParentStatus(st)}
                      style={{
                        padding: "5px 10px", borderRadius: 5,
                        background: pst === st ? col : "transparent",
                        border: `1px solid ${pst === st ? col : C.border}`,
                        color: pst === st ? "#fff" : C.textMid,
                        fontSize: 11, fontFamily: font, fontWeight: 600, cursor: "pointer",
                      }}>{lbl}</button>
                  ))}
                  {(pst === "reviewing" || pst === "done") && (
                    <div style={{ display: "flex", gap: 4, marginLeft: 4 }}>
                      {[
                        [1, "вЬХ", C.red, "гВПгБЛгВЙгБ™гБД"],
                        [2, "вЦ≥", C.yellow, "гБВгВДгБµгВД"],
                        [3, "вЧЛ", C.blue, "дЄАењЬ"],
                        [4, "вЧО", C.green, "дЄЗеЕ®"],
                      ].map(([lv, mark, col, lbl]) => (
                        <button key={lv} onClick={() => setParentUnderstanding(parentTodo.understanding === lv ? null : lv)}
                          title={lbl}
                          style={{
                            width: 28, height: 28, borderRadius: 5,
                            background: parentTodo.understanding === lv ? col : "transparent",
                            border: `1px solid ${parentTodo.understanding === lv ? col : C.border}`,
                            color: parentTodo.understanding === lv ? "#fff" : C.textDim,
                            fontSize: 12, fontWeight: 700, cursor: "pointer",
                            padding: 0, lineHeight: 1, fontFamily: font,
                          }}>{mark}</button>
                      ))}
                    </div>
                  )}
                </div>
              </div>
              {/* Children list */}
              <div style={{ overflowY: "auto", padding: 16 }}>
                {children.length === 0 ? (
                  <div style={{ padding: 20, textAlign: "center", color: C.textDim, fontSize: 12 }}>
                    гБУгБЃзЂ†гБЂгБѓдЊЛй°МгБМзЩїйМ≤гБХгВМгБ¶гБДгБЊгБЫгВУ<br />
                    <span style={{ fontSize: 11 }}>гАМзІСзЫЃгАНзФїйЭҐгБЛгВЙињљеК†гБІгБНгБЊгБЩ</span>
                  </div>
                ) : (
                  children.map(c => {
                    const cst = c.status || (c.done ? "done" : "unwatched");
                    const cycleC = () => {
                      const next = cst === "unwatched" ? "reviewing" : cst === "reviewing" ? "done" : "unwatched";
                      setChildStatus(c.id, next);
                    };
                    const cInfo = {
                      unwatched: { bg: "transparent", color: C.textDim, border: C.border, mark: "" },
                      reviewing: { bg: C.yellow, color: "#fff", border: C.yellow, mark: "вЧР" },
                      done: { bg: accent, color: "#fff", border: accent, mark: "вЬУ" },
                    }[cst];
                    return (
                      <div key={c.id} style={{
                        padding: "10px 0", borderBottom: `1px solid ${C.border}`,
                        opacity: cst === "done" ? 0.65 : 1,
                      }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                          <button onClick={cycleC} style={{
                            width: 30, height: 30, borderRadius: "50%",
                            border: `2px solid ${cInfo.border}`, background: cInfo.bg,
                            color: cInfo.color, fontSize: 14, fontWeight: 700, cursor: "pointer",
                            flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center",
                            padding: 0,
                          }}>{cInfo.mark}</button>
                          <span style={{
                            flex: 1, fontSize: 14,
                            color: cst === "done" ? C.textMid : C.text,
                            textDecoration: cst === "done" ? "line-through" : "none",
                          }}>{c.text}</span>
                          {c.minutes ? <span style={{ fontSize: 11, color: accent, fontWeight: 600 }}>{c.minutes}m</span> : null}
                        </div>
                        {(cst === "reviewing" || cst === "done") && (
                          <div style={{ display: "flex", gap: 5, marginTop: 6, marginLeft: 40 }}>
                            {[
                              [1, "вЬХ", C.red, "гВПгБЛгВЙгБ™гБД"],
                              [2, "вЦ≥", C.yellow, "гБВгВДгБµгВД"],
                              [3, "вЧЛ", C.blue, "дЄАењЬ"],
                              [4, "вЧО", C.green, "дЄЗеЕ®"],
                            ].map(([lv, mark, col, lbl]) => (
                              <button key={lv} onClick={() => setChildUnderstanding(c.id, c.understanding === lv ? null : lv)}
                                title={lbl}
                                style={{
                                  width: 32, height: 32, borderRadius: 6,
                                  background: c.understanding === lv ? col : "transparent",
                                  border: `1px solid ${c.understanding === lv ? col : C.border}`,
                                  color: c.understanding === lv ? "#fff" : C.textDim,
                                  fontSize: 14, fontWeight: 700, cursor: "pointer",
                                  padding: 0, lineHeight: 1, fontFamily: font,
                                }}>{mark}</button>
                            ))}
                          </div>
                        )}
                      </div>
                    );
                  })
                )}
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

/* вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
   REVIEW VIEW (жМѓгВКињФгВК)
вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР */
function ReviewView({ tasks, setTasks, selectedDate, setSelectedDate, setView, subjects, subjectTodos, settings, goals }) {
  const [reviewType, setReviewType] = useState("day"); // day | week | month
  const [memo, setMemo] = useState("");
  const [mood, setMood] = useState(null);
  const [tomorrowTheme, setTomorrowTheme] = useState("");

  const dayTasks = tasks.filter(t => t.date === selectedDate).sort((a, b) => (a.hour ?? 99) - (b.hour ?? 99));
  const done = dayTasks.filter(t => t.done);
  const notDone = dayTasks.filter(t => !t.done);

  // For a review task, derive the textbook (TX) label from its source todo.
  // Example problems (дЊЛй°М) are stored as children of a TX chapter and don't
  // carry the TX number in their own title, so we inherit it from the parent
  // chapter's text (e.g. "TX5-1 жЬђжФѓеЇЧдЉЪи®И" вЖТ "tx5"). Returns null for
  // non-review tasks, when no source todo is found, or when the title already
  // shows the TX number.
  const reviewTxLabel = (task) => {
    if (!task.isReview || !task.subjectTodoId) return null;
    const todo = subjectTodos.find(s => s.id === task.subjectTodoId);
    if (!todo) return null;
    const source = todo.parentId ? subjectTodos.find(s => s.id === todo.parentId) : todo;
    const text = (source && source.text) || todo.text || "";
    const m = text.match(/TX\s*(\d+)/i);
    if (!m) return null;
    if (task.title.toLowerCase().includes(`tx${m[1]}`)) return null;
    return `tx${m[1]}`;
  };
  const reviewDisplayTitle = (task) => {
    const txLabel = reviewTxLabel(task);
    if (!txLabel) return task.title;
    const PREFIX = "еЊ©зњТ: ";
    return task.title.startsWith(PREFIX)
      ? `${PREFIX}${txLabel} ${task.title.slice(PREFIX.length)}`
      : `${txLabel} ${task.title}`;
  };
  const rate = dayTasks.length ? Math.round((done.length / dayTasks.length) * 100) : 0;

  const tomorrow = addDays(selectedDate, 1);

  const [carriedIds, setCarriedIds] = useState([]);
  const carryOver = (taskId) => {
    const t = tasks.find(x => x.id === taskId);
    if (!t) return;
    setTasks(ts => [...ts, { ...t, id: genId(), date: tomorrow, hour: null, done: false, actual: null }]);
    setCarriedIds(ids => [...ids, taskId]);
  };

  const moods = ["рЯШЂ","рЯШХ","рЯШР","рЯЩВ","рЯШД"];

  return (
    <div style={{ padding: 16, maxWidth: 560, margin: "0 auto", display: "flex", flexDirection: "column", gap: 14 }}>
      {/* Review type tabs */}
      <div style={{ display: "flex", gap: 6 }}>
        {[
          ["day", "рЯУЕ жЧ•жђ°"],
          ["week", "рЯУЖ йА±жђ°"],
          ["month", "рЯЧУ жЬИжђ°гГїдЇИжЄђ"],
        ].map(([k, l]) => (
          <button key={k} onClick={() => setReviewType(k)}
            style={{ ...btn(reviewType === k, C.accent, { flex: 1, fontSize: 12, padding: "7px 4px" }) }}>
            {l}
          </button>
        ))}
      </div>

      {reviewType === "day" && <>
      {/* Date selector */}
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        <button onClick={() => setSelectedDate(addDays(selectedDate, -1))} style={{ ...btn(), padding: "5px 10px" }}>вАє</button>
        <div style={{ flex: 1, textAlign: "center", fontFamily: serif, fontSize: 17, color: C.text, cursor: "pointer", position: "relative" }}
          onClick={() => document.getElementById("date-jump-review")?.showPicker?.()}>
          {new Date(selectedDate + "T00:00:00").toLocaleDateString("ja-JP", { month: "long", day: "numeric" })} гБЃжМѓгВКињФгВК
          <input id="date-jump-review" type="date" value={selectedDate}
            onChange={e => e.target.value && setSelectedDate(e.target.value)}
            style={{ position: "absolute", inset: 0, opacity: 0, cursor: "pointer", border: "none" }} />
        </div>
        <button onClick={() => setSelectedDate(addDays(selectedDate, 1))} style={{ ...btn(), padding: "5px 10px" }}>вАЇ</button>
        <button onClick={() => setSelectedDate(todayStr())} style={{ ...btn(false, C.accent, { fontSize: 11, padding: "5px 9px" }) }}>дїКжЧ•</button>
      </div>

      {/* Stats */}
      <div style={{ ...card(), display: "flex", gap: 16 }}>
        <div style={{ flex: 1, textAlign: "center" }}>
          <div style={{ fontFamily: serif, fontSize: 32, color: rate >= 70 ? C.green : rate >= 40 ? C.yellow : C.red }}>
            {rate}%
          </div>
          <div style={{ fontSize: 11, color: C.textMid }}>йБФжИРзОЗ</div>
        </div>
        <div style={{ flex: 1, textAlign: "center" }}>
          <div style={{ fontFamily: serif, fontSize: 32, color: C.accent }}>{done.length}</div>
          <div style={{ fontSize: 11, color: C.textMid }}>еЃМдЇЖгВњгВєгВѓ</div>
        </div>
        <div style={{ flex: 1, textAlign: "center" }}>
          <div style={{ fontFamily: serif, fontSize: 32, color: C.textMid }}>{notDone.length}</div>
          <div style={{ fontSize: 11, color: C.textMid }}>жЬ™еЃМдЇЖ</div>
        </div>
      </div>

      {/* Done tasks */}
      {done.length > 0 && (
        <div style={card()}>
          <div style={{ fontSize: 12, fontWeight: 700, color: C.green, marginBottom: 8, letterSpacing: 1 }}>вЬУ еЃМдЇЖ</div>
          {done.map(t => (
            <div key={t.id} style={{ padding: "7px 0", borderBottom: `1px solid ${C.border}`, fontSize: 13, color: C.textMid, display: "flex", gap: 8 }}>
              <span style={{ color: C.green }}>вЬУ</span> {t.title}
              <span style={{ marginLeft: "auto", fontSize: 11, color: C.textDim }}>{fmtTime(t.hour)}гАЬ{fmtTime(t.hour + t.duration)}</span>
            </div>
          ))}
        </div>
      )}

      {/* Not done tasks with carryover */}
      {notDone.length > 0 && (
        <div style={card()}>
          <div style={{ fontSize: 12, fontWeight: 700, color: C.red, marginBottom: 8, letterSpacing: 1 }}>вЧЛ жЬ™еЃМдЇЖ</div>
          {notDone.map(t => (
            <div key={t.id} style={{ padding: "7px 0", borderBottom: `1px solid ${C.border}`, display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ fontSize: 13, color: C.text, flex: 1 }}>{reviewDisplayTitle(t)}</span>
              {carriedIds.includes(t.id) ? (
                <span style={{ fontSize: 11, color: C.green, fontWeight: 700, padding: "3px 9px" }}>вЬУ зє∞иґКжЄИ</span>
              ) : (
                <button onClick={() => carryOver(t.id)} style={{ ...btn(false, C.accent, { fontSize: 11, padding: "3px 9px" }) }}>
                  зњМжЧ•гБЂзє∞иґК вЖТ
                </button>
              )}
            </div>
          ))}
        </div>
      )}

      {/* Mood */}
      <div style={card()}>
        <div style={{ fontSize: 12, fontWeight: 700, color: C.textMid, marginBottom: 10 }}>дїКжЧ•гБЃж∞ЧеИЖ</div>
        <div style={{ display: "flex", gap: 8, justifyContent: "center" }}>
          {moods.map((m, i) => (
            <button key={i} onClick={() => setMood(i)}
              style={{ fontSize: 26, background: "none", border: `2px solid ${mood === i ? C.accent : "transparent"}`, borderRadius: 10, cursor: "pointer", padding: "4px 8px", opacity: mood !== null && mood !== i ? 0.4 : 1 }}>
              {m}
            </button>
          ))}
        </div>
      </div>

      {/* Memo */}
      <div style={card()}>
        <div style={{ fontSize: 12, fontWeight: 700, color: C.textMid, marginBottom: 8 }}>дЄАи®АгГ°гГҐ</div>
        <textarea style={{ ...input(), minHeight: 70, resize: "vertical", lineHeight: 1.6 }}

      </div>
      </>}

      {reviewType === "week" && (() => {

        const weekTasks = tasks.filter(t => weekDates.includes(t.date));
        const weekDone = weekTasks.filter(t => t.done);
        const weekStudy = weekDone.filter(t => t.kind !== "other");

        const totalHours = weekStudy.reduce((s, t) => s + (t.duration || 0), 0);

          return { subject: s, totalMin, watchedMin, remainMin, totalCount: todos.length, watchedCount: watchedTodos.length };

              <div style={{ flex: 1, textAlign: "center" }}>

                <div style={{ fontSize: 10, color: C.textMid }}>еЃМдЇЖгВњгВєгВѓ</div>
              </div>
            </div>

            {/* Per-goal forecasts */}
            {goalForecasts.length === 0 ? (
              <div style={{ ...card(), textAlign: "center", padding: 16, fontSize: 12, color: C.textMid }}>
                гВігГЉгГЂзФїйЭҐгБІгАМйЦҐйА£гБЩгВЛзІСзЫЃгАНгВТи®≠еЃЪгБЩгВЛгБ®гАБгВігГЉгГЂгБФгБ®гБЃйБФжИРдЇИжЄђгБМи°®з§ЇгБХгВМгБЊгБЩ
              </div>
            ) : goalForecasts.map(f => (
              <div key={f.goal.id} style={{ ...card(), borderLeft: `4px solid ${f.willFinish ? C.green : C.red}` }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: C.textMid, marginBottom: 4, display: "flex", alignItems: "center", gap: 6 }}>
                  <span style={{ width: 10, height: 10, borderRadius: "50%", background: f.goal.color, display: "inline-block" }} />
                  <span style={{ flex: 1 }}>{f.goal.title}</span>
                  <span style={{ color: f.daysLeft < 30 ? C.red : C.textMid }}>гБВгБ® {f.daysLeft} жЧ•</span>
                </div>
                <div style={{ fontSize: 10, color: C.textDim, marginBottom: 8, display: "flex", gap: 4, flexWrap: "wrap" }}>
                  {f.linkedStats.map(x => (
                    <span key={x.subject.id} style={{ color: x.subject.color }}>рЯУЪ {x.subject.name}</span>
                  ))}
                </div>
                <div style={{ display: "flex", gap: 12, marginBottom: 10 }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 10, color: C.textMid }}>зЫіињС14жЧ•гБЃеє≥еЭЗ</div>
                    <div style={{ fontSize: 18, fontFamily: serif, color: C.text }}>
                      {(f.dailyPaceMin / 60).toFixed(1)}h<span style={{ fontSize: 10, color: C.textMid }}>/жЧ•</span>
                    </div>
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 10, color: C.textMid }}>ењЕи¶БгГЪгГЉгВє</div>
                    <div style={{ fontSize: 18, fontFamily: serif, color: f.willFinish ? C.green : C.red }}>
                      {(f.requiredDailyMin / 60).toFixed(1)}h<span style={{ fontSize: 10, color: C.textMid }}>/жЧ•</span>
                    </div>
                  </div>
                </div>
                <div style={{ fontSize: 12, color: f.willFinish ? C.green : C.red, fontWeight: 700 }}>
                  {f.remainMin === 0
                    ? `вЬУ йБФжИРжЄИгБњпЉБ`
                    : f.willFinish
                      ? `вЬУ гБУгБЃгГЪгГЉгВєгБ™гВЙйЦУгБЂеРИгБЖи¶ЛиЊЉгБњпЉИжЃЛгВК${(f.remainMin/60).toFixed(0)}hпЉЙ`
                      : `вЪ† гГЪгГЉгВєдЄНиґ≥пЉИжЃЛгВК${(f.remainMin/60).toFixed(0)}h / дЄНиґ≥${((f.requiredDailyMin - f.dailyPaceMin)/60).toFixed(1)}h/жЧ•пЉЙ`}
                </div>
              </div>
            ))}

            {/* Subject progress */}
            {subjectStats.length > 0 && (
              <div style={card()}>
                <div style={{ fontSize: 12, fontWeight: 700, color: C.textMid, marginBottom: 10 }}>зІСзЫЃеИ•гБЃи¶ЦиБійА≤жНЧ</div>
                {subjectStats.map(x => {
                  const pct = x.totalMin ? (x.watchedMin / x.totalMin) * 100 : 0;
                  return (
                    <div key={x.subject.id} style={{ marginBottom: 10 }}>
                      <div style={{ display: "flex", fontSize: 12, color: C.text, marginBottom: 3 }}>

/* вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
   SUBJECTS VIEW (зІСзЫЃеИ•TODO)
вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР */
function ChildAdder({ onAdd, onBulkAdd, subjectColor, parentText, materialMode, addLabel, noChapter }) {
  const [text, setText] = useState("");
  const [bulkOpen, setBulkOpen] = useState(false);
  const [bulkPrefix, setBulkPrefix] = useState(noChapter ? "дЊЛй°М" : (materialMode ? "" : "дЊЛй°М"));
  const [bulkCount, setBulkCount] = useState(5);
  const [bulkStart, setBulkStart] = useState("");
  const [bulkMinutes, setBulkMinutes] = useState("");

  // Extract chapter number from parent text
  // Priority: "XX1-3" вЖТ 1, "1зЂ†" вЖТ 1, fallback to first standalone number
  const extractChapter = (text) => {
    if (!text) return "1";
    let m = text.match(/(\d+)[-вИТ]/);
    if (m) return m[1];
    m = text.match(/(\d+)\s*зЂ†/);
    if (m) return m[1];
    m = text.match(/(\d+)/);
    if (m) return m[1];
    return "1";
  };
  const [bulkChapter, setBulkChapter] = useState(extractChapter(parentText));

  // Re-init chapter when bulk panel opens
  const openBulk = () => {
    setBulkChapter(extractChapter(parentText));
    setBulkOpen(true);
  };

  const submit = () => {
    if (!text.trim()) return;
    onAdd(text);
    setText("");
  };

  const submitBulk = () => {
    const n = parseInt(bulkCount);
    if (!n || n < 1) return;
    const items = [];
    const chap = bulkChapter.trim() || "1";
    const start = bulkStart.trim() === "" ? 1 : (parseInt(bulkStart) || 1);
    for (let i = 0; i < n; i++) {
      const num = start + i;
      const text = noChapter ? `${bulkPrefix}${num}` : `${bulkPrefix}${chap}-${num}`;
      items.push({
        text,
        minutes: bulkMinutes ? +bulkMinutes : null,
      });
    }
    onBulkAdd(items);
    setBulkOpen(false);
    setBulkCount(5);
    setBulkStart("");
    setBulkMinutes("");
  };

  const previewStart = bulkStart.trim() === "" ? 1 : (parseInt(bulkStart) || 1);
  const previewEnd = previewStart + Math.max(0, (parseInt(bulkCount) || 0) - 1);

  return (
    <div style={{ marginTop: 8, paddingTop: 8, borderTop: `1px dashed ${C.border}` }}>
      {!bulkOpen ? (
        <>
          <div style={{ display: "flex", gap: 6 }}>
            <input style={{ ...input({ flex: 1, fontSize: 12, padding: "5px 8px" }) }}
              placeholder={addLabel || "й†ЕзЫЃгВТињљеК†пЉИдЊЛ: дЊЛй°М1гАБеХП1пЉЙ"}
              value={text} onChange={e => setText(e.target.value)}
              onKeyDown={e => e.key === "Enter" && submit()} />
            <button onClick={submit} style={{
              padding: "5px 12px", borderRadius: 5, border: "none",
              background: text.trim() ? subjectColor : C.border, color: "#fff",
              fontSize: 12, fontWeight: 700, cursor: text.trim() ? "pointer" : "not-allowed",
              fontFamily: font,
            }}>+ ињљеК†</button>
          </div>
          <button onClick={openBulk} style={{
            marginTop: 6, padding: "4px 10px", borderRadius: 5,
            background: "transparent", border: `1px dashed ${subjectColor}`,
            color: subjectColor, fontSize: 11, fontFamily: font, cursor: "pointer",
          }}>рЯУР йА£зХ™гБІињљеК†</button>
        </>
      ) : (
        <div style={{ background: C.surfaceUp, padding: 10, borderRadius: 6 }}>
          <div style={{ fontSize: 11, color: C.textMid, marginBottom: 6 }}>
            гГЧгГђгГУгГ•гГЉ: <span style={{ color: subjectColor, fontWeight: 700 }}>
              {noChapter
                ? `${bulkPrefix}${previewStart} гАЬ ${bulkPrefix}${previewEnd}`
                : `${bulkPrefix}${bulkChapter || "1"}-${previewStart} гАЬ ${bulkPrefix}${bulkChapter || "1"}-${previewEnd}`}
            </span>
          </div>
          <div style={{ display: "grid", gridTemplateColumns: noChapter ? "2fr 1fr 1fr 1fr" : "1.5fr 1fr 1fr 1fr 1fr", gap: 6, marginBottom: 8 }}>
            <label style={{ fontSize: 10, color: C.textMid }}>
              жО•й†≠иЊЮ
              <input style={{ ...input({ fontSize: 12, padding: "4px 6px" }) }}
                value={bulkPrefix} onChange={e => setBulkPrefix(e.target.value)} />
            </label>
            {!noChapter && (
              <label style={{ fontSize: 10, color: C.textMid }}>
                зЂ†зХ™еПЈ
                <input style={{ ...input({ fontSize: 12, padding: "4px 6px" }) }}
                  value={bulkChapter} onChange={e => setBulkChapter(e.target.value)} />
              </label>
            )}
            <label style={{ fontSize: 10, color: C.textMid }}>
              йЦЛеІЛзХ™еПЈ
              <input style={{ ...input({ fontSize: 12, padding: "4px 6px" }) }}
                type="number" min="1" placeholder="1"
                value={bulkStart} onChange={e => setBulkStart(e.target.value)} />
            </label>
            <label style={{ fontSize: 10, color: C.textMid }}>
              еАЛжХ∞
              <input style={{ ...input({ fontSize: 12, padding: "4px 6px" }) }}
                type="number" min="1" max="100"
                value={bulkCount} onChange={e => setBulkCount(e.target.value)} />
            </label>
            <label style={{ fontSize: 10, color: C.textMid }}>
              еРДеИЖжХ∞ (дїїжДП)
              <input style={{ ...input({ fontSize: 12, padding: "4px 6px" }) }}
                type="number" min="0" placeholder="еИЖ"
                value={bulkMinutes} onChange={e => setBulkMinutes(e.target.value)} />
            </label>
          </div>
          <div style={{ display: "flex", gap: 6 }}>
            <button onClick={submitBulk} style={{
              flex: 1, padding: "5px 10px", borderRadius: 5, border: "none",
              background: subjectColor, color: "#fff", fontSize: 12, fontWeight: 700,
              cursor: "pointer", fontFamily: font,
            }}>{bulkCount}дїґињљеК†</button>
            <button onClick={() => setBulkOpen(false)} style={{
              padding: "5px 12px", borderRadius: 5, border: `1px solid ${C.border}`,
              background: "transparent", color: C.textMid, fontSize: 12, cursor: "pointer", fontFamily: font,
            }}>гВ≠гГ£гГ≥гВїгГЂ</button>
          </div>
        </div>
      )}
    </div>
  );
}

function SubjectsView({ subjects, setSubjects, subjectTodos, setSubjectTodos, monthlyPlans, setMonthlyPlans, weeklyPlans, setWeeklyPlans, tasks, setTasks, selectedDate, goals, subjectCategories, setSubjectCategories, settings }) {
  const autoMode = (settings?.scheduleMode ?? "auto") === "auto";
  const chunkBoundary = settings?.chunkBoundary ?? true;
  // Categories: persisted list, plus any from existing subjects
  const allCategories = [...new Set([...(subjectCategories || ["CPAеЛЙеЉЈ"]), ...subjects.map(s => s.category || "CPAеЛЙеЉЈ")])];
  if (allCategories.length === 0) allCategories.push("CPAеЛЙеЉЈ");
  const [activeCategory, setActiveCategory] = useState(allCategories[0]);
  const isMaterialCat = activeCategory && activeCategory !== "CPAеЛЙеЉЈ";
  const categorySubjects = subjects.filter(s => (s.category || "CPAеЛЙеЉЈ") === activeCategory);
  // Group layer (only for non-CPA categories): e.g. "йЂШж†°жХ∞е≠¶". Subjects (=жХЩжЭР) carry an optional `group`.
  const groupsInCategory = [...new Set(categorySubjects.map(s => s.group || "").filter(g => g))];
  const [activeGroup, setActiveGroup] = useState(groupsInCategory[0] || null);
  // Subjects shown in the subject(жХЩжЭР) tab row: filtered by group when in material category
  const visibleSubjects = isMaterialCat
    ? categorySubjects.filter(s => (s.group || "") === (activeGroup || ""))
    : categorySubjects;
  const [activeSubject, setActiveSubject] = useState(categorySubjects[0]?.id || null);
  const [showSubjectForm, setShowSubjectForm] = useState(false);
  const [newSubject, setNewSubject] = useState({ name: "", color: C.blue, group: "" });
  const [showGroupForm, setShowGroupForm] = useState(false);
  const [newGroupName, setNewGroupName] = useState("");
  const [newTodo, setNewTodo] = useState("");
  const [newTodoMinutes, setNewTodoMinutes] = useState("");
  const [editTodoId, setEditTodoId] = useState(null);
  const [editTodoText, setEditTodoText] = useState("");
  const [editTodoMinutes, setEditTodoMinutes] = useState("");
  const [confirmDelete, setConfirmDelete] = useState(null);
  const [filter, setFilter] = useState("all"); // all | active | done
  const [monthPickerTodo, setMonthPickerTodo] = useState(null);
  const [editSubjectId, setEditSubjectId] = useState(null);
  const [editSubjectName, setEditSubjectName] = useState("");
  const [editSubjectColor, setEditSubjectColor] = useState("");
  const [editSubjectGroup, setEditSubjectGroup] = useState("");
  const [selectMode, setSelectMode] = useState(false);
  const [selectedTodos, setSelectedTodos] = useState([]);
  const [bulkMonthPicker, setBulkMonthPicker] = useState(false);
  const [bulkMonthIds, setBulkMonthIds] = useState([]); // which todo ids the month picker acts on (parent/child/grandchild)
  const [addOpen, setAddOpen] = useState(false); // гАМпЉЛињљеК†гАНгВТжКЉгБЩгБ®ињљеК†жЦєж≥ХгБМйЦЛгБП
  const [addTab, setAddTab] = useState("single"); // "single" | "bulk" | "seq" вАФ unified ињљеК†гВњгГЦ
  const [bulkText, setBulkText] = useState("");
  const [tpl, setTpl] = useState({ prefix: "TX", chapters: [{ chapter: 1, sections: 10 }], suffix: "", minutes: 60, numberingMode: "perChapter" });
  const [chapterTitlesText, setChapterTitlesText] = useState("");
  // Auto-distribute (иЗ™еЛХеИЖйЕН): spread a subject's remaining units across days
  const [autoDistIds, setAutoDistIds] = useState(null); // target todo ids, or null when modal closed
  const [autoDistMode, setAutoDistMode] = useState("deadline"); // 'deadline' | 'hours'
  const [autoDistDeadline, setAutoDistDeadline] = useState(addDays(todayStr(), 30));
  const [autoDistHours, setAutoDistHours] = useState("2");
  const [autoDistStart, setAutoDistStart] = useState(todayStr());
  const [autoDistWeekdays, setAutoDistWeekdays] = useState([0, 1, 2, 3, 4, 5, 6]);

  const COLORS = [C.blue, C.green, C.accent, C.purple, C.red, C.yellow];

  // When category changes: pick first group (material cat) and a sensible active subject
  useEffect(() => {
    const subsInCat = subjects.filter(s => (s.category || "CPAеЛЙеЉЈ") === activeCategory);
    const mat = activeCategory && activeCategory !== "CPAеЛЙеЉЈ";
    if (mat) {
      const grps = [...new Set(subsInCat.map(s => s.group || "").filter(g => g))];
      if (!grps.includes(activeGroup)) {
        setActiveGroup(grps[0] || null);
      }
    }
    if (!subsInCat.some(s => s.id === activeSubject)) {
      setActiveSubject(subsInCat[0]?.id || null);
    }
  }, [activeCategory, subjects]);

  // When group changes (material category): switch active subject into that group
  useEffect(() => {
    if (!isMaterialCat) return;
    const inGroup = categorySubjects.filter(s => (s.group || "") === (activeGroup || ""));
    if (!inGroup.some(s => s.id === activeSubject)) {
      setActiveSubject(inGroup[0]?.id || null);
    }
  }, [activeGroup]);

  useEffect(() => {
    if (!activeSubject && visibleSubjects.length > 0) setActiveSubject(visibleSubjects[0].id);
  }, [subjects, activeSubject]);

  const addSubject = () => {
    if (!newSubject.name.trim()) return;
    const id = genId();
    const grp = isMaterialCat ? (activeGroup || newSubject.group || "") : "";
    setSubjects(ss => [...ss, { id, name: newSubject.name, color: newSubject.color, category: activeCategory, group: grp }]);
    setActiveSubject(id);
    setNewSubject({ name: "", color: C.blue, group: "" });
    setShowSubjectForm(false);
  };

  // Add a new group (зІСзЫЃ) within the current material category
  const addGroup = () => {
    const name = newGroupName.trim();
    if (!name) return;
    setActiveGroup(name);
    setNewGroupName("");
    setShowGroupForm(false);
    // A group becomes "real" once it has a subject; opening the subject form helps the user add one
    setShowSubjectForm(true);
  };

  const deleteSubject = (id) => {
    setSubjects(ss => ss.filter(s => s.id !== id));
    setSubjectTodos(ts => ts.filter(t => t.subjectId !== id));
    if (activeSubject === id) setActiveSubject(null);
    setConfirmDelete(null);
  };

  const addTodo = () => {
    if (!newTodo.trim() || !activeSubject) return;
    setSubjectTodos(ts => [...ts, {
      id: genId(), subjectId: activeSubject,
      text: newTodo, minutes: newTodoMinutes ? +newTodoMinutes : null,
      status: "unwatched", done: false, createdAt: Date.now()
    }]);
    setNewTodo("");
    setNewTodoMinutes("");
  };

  // Parse a line like "TX1-1 жРНзЫКи®ИзЃЧжЫЄ 60" -> {text, minutes}
  const parseChapterTitles = (rawText) => {
    const lines = rawText.split("\n").map(l => l.trim()).filter(l => l);
    return lines.map((line, i) =>
      /^зђђ\d+зЂ†/.test(line) ? line : `зђђ${i + 1}зЂ† ${line}`
    );
  };

  const parseLine = (line) => {
    const trimmed = line.trim();
    if (!trimmed) return null;
    // Try to find trailing number (minutes)
    const m = trimmed.match(/^(.+?)\s+(\d+)\s*$/);
    if (m) return { text: m[1].trim(), minutes: +m[2] };
    return { text: trimmed, minutes: null };
  };

  const bulkAddTodos = () => {
    if (!activeSubject) return;
    const lines = bulkText.split("\n").map(parseLine).filter(Boolean);
    if (!lines.length) return;
    const now = Date.now();
    setSubjectTodos(ts => [...ts, ...lines.map((l, i) => ({
      id: genId(), subjectId: activeSubject,
      text: l.text, minutes: l.minutes,
      status: "unwatched", done: false, createdAt: now + i,
    }))]);
    setBulkText("");
    setAddTab("single");
  };

  const templateAddTodos = () => {
    if (!activeSubject) return;
    const items = [];
    const now = Date.now();

    if (tpl.numberingMode === "chapterTitle") {
      const parsed = parseChapterTitles(chapterTitlesText);
      if (!parsed.length) return;
      parsed.forEach((text, i) => {
        items.push({
          id: genId(), subjectId: activeSubject,
          text,
          minutes: tpl.minutes || null,
          status: "unwatched", done: false, createdAt: now + i,
        });
      });
      if (items.length) setSubjectTodos(ts => [...ts, ...items]);
      setChapterTitlesText("");
      setAddTab("single");
      return;
    }

    let i = 0;
    let runningNum = 1; // continuous numbering across chapters
    tpl.chapters.forEach(({ chapter, sections, title }) => {
      const chapTitle = (title || "").trim();
      for (let s = 1; s <= sections; s++) {
        let text;
        if (tpl.numberingMode === "continuous") {
          // йАЪгБЧзХ™еПЈгБЃгБњ: TX1, TX2, TX3...
          text = `${tpl.prefix}${runningNum}`;
        } else if (tpl.numberingMode === "chapterContinuous") {
          // зЂ†дїШгБНйАЪгБЧзХ™еПЈ: TX1-1, TX1-2... TX2-16, TX2-17...
          text = `${tpl.prefix}${chapter}-${runningNum}`;
        } else {
          // perChapter (default): TX1-1, TX1-2... TX2-1, TX2-2...
          text = `${tpl.prefix}${chapter}-${s}`;
        }
        // Prepend chapter title if provided (e.g. "зђђ1зЂ† жХ∞гБ®еЉП 1-1")
        const titlePrefix = chapTitle ? `зђђ${chapter}зЂ† ${chapTitle} ` : "";
        items.push({
          id: genId(), subjectId: activeSubject,
          text: titlePrefix + text + (tpl.suffix ? " " + tpl.suffix : ""),
          minutes: tpl.minutes || null,
          status: "unwatched", done: false, createdAt: now + (i++),
        });
        runningNum++;
      }
    });
    if (items.length) setSubjectTodos(ts => [...ts, ...items]);
    setAddTab("single");
  };

  const setStatus = (id, status) => {
    setSubjectTodos(ts => ts.map(t => t.id === id ? { ...t, status, done: status === "done" } : t));
  };

  const REVIEW_DAYS = { 1: 1, 2: 3, 3: 7, 4: null };
  const setUnderstanding = (id, level) => {
    const todo = subjectTodos.find(t => t.id === id);
    setSubjectTodos(ts => ts.map(t => t.id === id ? { ...t, understanding: level } : t));
    // Schedule review if not perfect and we have a value
    const days = level && REVIEW_DAYS[level];
    if (days && todo) {
      const reviewDate = addDays(todayStr(), days);
      // Check if review task already exists for this todo on/after today
      const existingReview = tasks.find(t => t.subjectTodoId === id && t.isReview && t.date >= todayStr() && !t.done);
      // Compute review duration: if todo has children (parent), use parent+children sum; else use todo.minutes
      const childMin = subjectTodos.filter(c => c.parentId === todo.id).reduce((s, c) => s + (c.minutes || 0), 0);
      const totalMin = (todo.minutes || 0) + childMin;
      const reviewDur = totalMin ? Math.max(1/60, totalMin / 60) : 1;
      if (existingReview) {
        // Update existing review date and duration
        setTasks(ts => ts.map(t => t.id === existingReview.id ? { ...t, date: reviewDate, duration: reviewDur } : t));
      } else {
        const baseTitle = taskTitleFor(todo);
        const reviewTitle = baseTitle.startsWith("еЊ©зњТ: ") ? baseTitle : `еЊ©зњТ: ${baseTitle}`;
        setTasks(ts => [...ts, {
          id: genId(), date: reviewDate, title: reviewTitle,
          hour: null, duration: reviewDur,
          priority: level === 1 ? "high" : level === 2 ? "medium" : "low",
          actual: null, done: false, note: "", goalId: null,
          kind: "study", subjectId: todo.subjectId, subjectTodoId: todo.id,
          isReview: true,
        }]);
      }
    }
  };

  // Current month key (YYYY-MM)
  const currentMonth = todayStr().slice(0, 7);
  // Current week dates
  const currentWeekDates = getWeekDates(selectedDate);

  // Check if todo is already in monthly/weekly/today plan
  const inMonthly = (todoId) => monthlyPlans.some(p => p.month === currentMonth && p.todoId === todoId);
  const inAnyMonthly = (todoId) => monthlyPlans.some(p => p.todoId === todoId);
  const monthsOf = (todoId) => monthlyPlans.filter(p => p.todoId === todoId).map(p => p.month).sort();
  const inWeekly = (todoId) => weeklyPlans.some(p => currentWeekDates.includes(p.weekStart) && p.todoId === todoId);
  const inToday = (todoId) => tasks.some(t => t.date === selectedDate && t.subjectTodoId === todoId);

  const sendToMonthly = (todo, monthKey = currentMonth) => {
    if (monthlyPlans.some(p => p.month === monthKey && p.todoId === todo.id)) return;
    setMonthlyPlans(ps => [...ps, {
      id: genId(), month: monthKey, todoId: todo.id,
      subjectId: todo.subjectId, createdAt: Date.now(),
    }]);
  };

  const sendToWeekly = (todo) => {
    if (inWeekly(todo.id)) return;
    setWeeklyPlans(ps => [...ps, {
      id: genId(), weekStart: currentWeekDates[0], todoId: todo.id,
      subjectId: todo.subjectId, createdAt: Date.now(),
    }]);
    // Also add to monthly if not yet
    if (!inMonthly(todo.id)) sendToMonthly(todo);
  };

  // Calculate total minutes including children (дЊЛй°М)
  const totalMinutesOf = (todo) => {
    const own = todo.minutes || 0;
    const childMin = subjectTodos
      .filter(c => c.parentId === todo.id)
      .reduce((s, c) => s + (c.minutes || 0), 0);
    return own + childMin;
  };

  // Convert minutes to task duration in hours, rounded to 15-min (0.25h) increments
  const todoDuration = (todo) => {
    const m = totalMinutesOf(todo);
    if (!m) return 1;
    return Math.max(1/60, m / 60);
  };

  // Build a task title: for non-CPA (material) subjects, prepend the subject (textbook) name
  const taskTitleFor = (todo) => {
    const subj = subjects.find(s => s.id === todo.subjectId);
    if (subj && subj.category && subj.category !== "CPAеЛЙеЉЈ") {
      return `${subj.name} ${todo.text}`;
    }
    return todo.text;
  };

  const sendToToday = (todo) => {
    if (inToday(todo.id)) return;
    const dur = todoDuration(todo);
    setTasks(ts => [...ts, {
      id: genId(), date: selectedDate, title: taskTitleFor(todo),
      hour: null, duration: dur, priority: "medium",
      actual: null, done: false, note: "",
      goalId: null, kind: "study", subjectId: todo.subjectId, subjectTodoId: todo.id,
    }]);
    if (!inWeekly(todo.id)) sendToWeekly(todo);
  };

  /* вФАвФА иЗ™еЛХеИЖйЕН (auto-distribute over days) вФАвФА */
  // A unit already has an open (not-done) task somewhere вЖТ skip to avoid dupes.
  const isScheduledActive = (todoId) => tasks.some(t => t.subjectTodoId === todoId && !t.done);

  // Open the modal for the given todo ids (keeps only schedulable top-level units).
  const openAutoDist = (ids) => {
    const list = ids.filter(id => {
      const t = subjectTodos.find(x => x.id === id);
      return t && isParent(t) && parentStatusOf(t) !== "done" && !isScheduledActive(t.id);
    });
    if (list.length === 0) return;
    setAutoDistIds(list);
  };

  // All descendants (дЊЛй°М etc.) of a todo, depth-first.
  const descendantsOf = (id) => {
    const out = [];
    const rec = (pid) => getChildren(pid).forEach(c => { out.push(c); rec(c.id); });
    rec(id);
    return out;
  };
  // Own duration in hours (excludes children); 0 if no own minutes.
  const ownDur = (t) => (t.minutes ? Math.max(1/60, t.minutes / 60) : 0);

  // Target units (sorted in textbook order) with their durations in hours.
  // chunkBoundary ON  вЖТ е§ІеХП+дЊЛй°МгВТ1гВїгГГгГИ(1гВњгВєгВѓ)гБ®гБЧгБ¶жЙ±гБЖгАВ
  // chunkBoundary OFF вЖТ е§ІеХПжЬђдљУгБ®еРДдЊЛй°МгВТеАЛеИ•гБЃе∞ПгГ¶гГЛгГГгГИгБЂеИЖгБСгБ¶йЕНеИЖгБЩгВЛгАВ
  const autoDistUnits = () => {
    const parents = (autoDistIds || [])
      .map(id => subjectTodos.find(t => t.id === id))
      .filter(Boolean)
      .filter(t => parentStatusOf(t) !== "done")
      .sort((a, b) => a.createdAt - b.createdAt);
    const units = [];
    parents.forEach(p => {
      if (chunkBoundary) {
        units.push({ todo: p, dur: todoDuration(p) });
        return;
      }
      const pieces = [{ t: p, d: ownDur(p) }, ...descendantsOf(p.id).map(k => ({ t: k, d: ownDur(k) }))]
        .filter(x => x.d > 0);
      if (pieces.length === 0) units.push({ todo: p, dur: 1 });
      else pieces.forEach(x => units.push({ todo: x.t, dur: x.d }));
    });
    return units;
  };

  // Greedy placement of units onto days. Returns [{ todo, date }].
  const computeAutoPlacements = (units) => {
    const placements = [];
    const weekdays = new Set(autoDistWeekdays);
    if (weekdays.size === 0 || units.length === 0) return placements;
    const start = autoDistStart || todayStr();
    const total = units.reduce((s, u) => s + u.dur, 0);
    if (autoDistMode === "deadline") {
      const days = activeDaysBetween(start, autoDistDeadline, weekdays);
      if (days.length === 0) return placements;
      const target = total / days.length;
      let di = 0, load = 0;
      for (const u of units) {
        if (load > 0 && load + u.dur > target + 1e-9 && di < days.length - 1) { di++; load = 0; }
        placements.push({ todo: u.todo, dur: u.dur, date: days[di] });
        load += u.dur;
      }
    } else {
      const target = Math.max(0.25, parseFloat(autoDistHours) || 0);
      let di = 0, load = 0;
      for (const u of units) {
        if (load > 0 && load + u.dur > target + 1e-9) { di++; load = 0; }
        placements.push({ todo: u.todo, dur: u.dur, date: nthActiveDay(start, weekdays, di) });
        load += u.dur;
      }
    }
    return placements;
  };

  const runAutoDistribute = () => {
    const units = autoDistUnits();
    const placements = computeAutoPlacements(units);
    if (placements.length === 0) return;

    const newTasks = placements.map(p => ({
      id: genId(), date: p.date, title: taskTitleFor(p.todo),
      hour: null, duration: p.dur ?? todoDuration(p.todo), priority: "medium",
      actual: null, done: false, note: "", goalId: null,
      kind: "study", subjectId: p.todo.subjectId, subjectTodoId: p.todo.id,
    }));
    setTasks(ts => [...ts, ...newTasks]);

    // Keep the month/week planning views in sync with the new schedule.
    const monthAdds = [], weekAdds = [];
    const seenM = new Set(), seenW = new Set();
    placements.forEach(p => {
      const month = p.date.slice(0, 7);
      if (!seenM.has(month + "|" + p.todo.id)) {
        seenM.add(month + "|" + p.todo.id);
        monthAdds.push({ id: genId(), month, todoId: p.todo.id, subjectId: p.todo.subjectId, createdAt: Date.now() });
      }
      const ws = getWeekDates(p.date)[0];
      if (!seenW.has(ws + "|" + p.todo.id)) {
        seenW.add(ws + "|" + p.todo.id);
        weekAdds.push({ id: genId(), weekStart: ws, todoId: p.todo.id, subjectId: p.todo.subjectId, createdAt: Date.now() });
      }
    });
    setMonthlyPlans(ps => {
      const ex = new Set(ps.map(p => p.month + "|" + p.todoId));
      return [...ps, ...monthAdds.filter(a => !ex.has(a.month + "|" + a.todoId))];
    });
    setWeeklyPlans(ps => {
      const ex = new Set(ps.map(p => p.weekStart + "|" + p.todoId));
      return [...ps, ...weekAdds.filter(a => !ex.has(a.weekStart + "|" + a.todoId))];
    });

    setAutoDistIds(null);
    setSelectMode(false);
    setSelectedTodos([]);
  };

  // Collect an id and all its descendants (recursive) from a list
  const collectWithDescendants = (ids, list) => {
    const toRemove = new Set(ids);
    let changed = true;
    while (changed) {
      changed = false;
      for (const t of list) {
        if (t.parentId && toRemove.has(t.parentId) && !toRemove.has(t.id)) {
          toRemove.add(t.id);
          changed = true;
        }
      }
    }
    return toRemove;
  };

  const deleteTodo = (id) => {
    setSubjectTodos(ts => {
      const rm = collectWithDescendants([id], ts);
      return ts.filter(t => !rm.has(t.id));
    });
  };

  // Delete multiple todos at once (also removes all their descendants)
  const deleteTodosBulk = (ids) => {
    setSubjectTodos(ts => {
      const rm = collectWithDescendants(ids, ts);
      return ts.filter(t => !rm.has(t.id));
    });
  };

  const saveEdit = () => {
    if (!editTodoText.trim()) return;
    setSubjectTodos(ts => ts.map(t => t.id === editTodoId
      ? { ...t, text: editTodoText, minutes: editTodoMinutes ? +editTodoMinutes : null }
      : t));
    setEditTodoId(null);
    setEditTodoText("");
    setEditTodoMinutes("");
  };

  const activeSubjectData = subjects.find(s => s.id === activeSubject);
  const STATUS_ORDER = { unwatched: 0, reviewing: 1, done: 2 };

  // Material mode: when category is not "CPAеЛЙеЉЈ", use textbook-oriented labels
  const isMaterialMode = activeSubjectData && activeSubjectData.category && activeSubjectData.category !== "CPAеЛЙеЉЈ";
  const L = isMaterialMode
    ? { unwatched: "жЬ™зЭАжЙЛ", done: "еЃМдЇЖ", progressLabel: "еПЦгВКзµДгБњ:" }
    : { unwatched: "жЬ™и¶ЦиБі", done: "и¶ЦиБіжЄИ", progressLabel: "еЛХзФї:" };

  // Helpers: parent/child relationship via parentId
  const isParent = (t) => !t.parentId;
  const getChildren = (parentId) => subjectTodos.filter(t => t.parentId === parentId).sort((a, b) => a.createdAt - b.createdAt);
  const hasKids = (id) => subjectTodos.some(t => t.parentId === id);

  // Parent status is independent: use its own status only (еЛХзФїи¶ЦиБігБЃйА≤жНЧ)
  const parentStatusOf = (todo) => todo.status || (todo.done ? "done" : "unwatched");

  // Total minutes = own minutes + sum of all descendants' minutes (recursive)
  const deriveMinutes = (todo) => {
    const own = todo.minutes || 0;
    const children = getChildren(todo.id);
    return own + children.reduce((s, c) => s + deriveMinutes(c), 0);
  };

  // Watched minutes: count own if reviewing/done, plus all descendants' watched (recursive)
  const watchedMinutesOf = (todo) => {
    let total = 0;
    const pst = parentStatusOf(todo);
    if (pst === "done" || pst === "reviewing") total += todo.minutes || 0;
    const children = getChildren(todo.id);
    total += children.reduce((s, c) => s + watchedMinutesOf(c), 0);
    return total;
  };

  // Top-level (parent) todos for active subject only
  const parentTodos = subjectTodos.filter(t => t.subjectId === activeSubject && isParent(t));
  const todos = parentTodos
    .filter(t => {
      const st = parentStatusOf(t);
      if (filter === "all") return true;
      if (filter === "unwatched") return st === "unwatched";
      if (filter === "reviewing") return st === "reviewing";
      return st === "done";
    })

          const offset = i === 0 ? "дїКжЬИ" : i === 1 ? "жЭ•жЬИ" : i === 2 ? "еЖНжЭ•жЬИ" : `+${i}гГґжЬИ`;
          // count how many of selected todos already in this month
          const inCount = selTodos.filter(t => monthlyPlans.some(p => p.month === key && p.todoId === t.id)).length;
          return { key, label, offset, inCount };
        });
        const fmtHourMin = (m) => m >= 60 ? `${Math.floor(m/60)}h${m%60 ? (m%60)+"m" : ""}` : `${m}m`;
        return (
          <div style={{
            position: "fixed", inset: 0, background: "#0008", zIndex: 100,
            display: "flex", alignItems: "center", justifyContent: "center", padding: 20,
          }} onClick={() => setBulkMonthPicker(false)}>
            <div style={{ ...card({ maxWidth: 420, width: "100%", maxHeight: "85vh", display: "flex", flexDirection: "column" }) }} onClick={e => e.stopPropagation()}>
              <div style={{ fontFamily: serif, fontSize: 16, color: C.text, marginBottom: 4 }}>жЬИгБЂгБЊгБ®гВБгБ¶ињљеК†</div>
              <div style={{ fontSize: 12, color: C.accent, marginBottom: 12 }}>
                {selTodos.length}дїґ / {fmtHourMin(totalMin)}
              </div>
              <div style={{ overflowY: "auto", display: "flex", flexDirection: "column", gap: 6 }}>
                {monthList.map(m => (
                  <button key={m.key} onClick={() => {
                    // Add all selected todos to this month (skip dupes)
                    const newPlans = [];
                    selTodos.forEach(t => {
                      if (!monthlyPlans.some(p => p.month === m.key && p.todoId === t.id)) {
                        newPlans.push({
                          id: genId(), month: m.key, todoId: t.id,
                          subjectId: t.subjectId, createdAt: Date.now() + Math.random(),
                        });
                      }
                    });
                    if (newPlans.length) setMonthlyPlans(ps => [...ps, ...newPlans]);
                  }} style={{
                    padding: "10px 14px", borderRadius: 8,
                    background: m.inCount === selTodos.length ? C.purple : C.surfaceUp,
                    border: `1px solid ${m.inCount > 0 ? C.purple : C.border}`,
                    color: m.inCount === selTodos.length ? "#fff" : C.text,
                    fontFamily: font, fontSize: 13, cursor: "pointer",
                    display: "flex", alignItems: "center", gap: 8,
                  }}>
                    <span style={{ flex: 1, textAlign: "left" }}>{m.label}</span>
                    <span style={{ fontSize: 11, opacity: 0.7 }}>{m.offset}</span>
                    {m.inCount > 0 && (
                      <span style={{ fontSize: 11 }}>{m.inCount}/{selTodos.length}</span>
