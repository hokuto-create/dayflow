                ))}
              </div>
              <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                <button onClick={() => setBulkMonthPicker(false)}
                  style={{ ...btn(false, C.textMid, { flex: 1, padding: "9px" }) }}>гВ≠гГ£гГ≥гВїгГЂ</button>
                <button onClick={() => {
                  setBulkMonthPicker(false); setBulkMonthIds([]);
                  setSelectMode(false); setSelectedTodos([]);
                  setChildSelectParent(null); setSelectedChildren([]);
                  setGrandSelectChild(null); setSelectedGrandchildren([]);
                }}
                  style={{ ...btn(true, C.accent, { flex: 1, padding: "9px" }) }}>еЃМдЇЖ</button>
              </div>
            </div>
          </div>
        );
      })()}

      {/* Auto-distribute modal */}
      {autoDistIds && (() => {
        const units = autoDistUnits();
        const placements = computeAutoPlacements(units);
        const totalH = units.reduce((s, u) => s + u.dur, 0);
        const dayCount = new Set(placements.map(p => p.date)).size;
        const lastDate = placements.length ? placements[placements.length - 1].date : null;
        const weekdaysSet = new Set(autoDistWeekdays);
        const fmtMD = (d) => { const o = new Date(d + "T00:00:00"); return `${o.getMonth() + 1}/${o.getDate()}(${DAYS_JA[o.getDay()]})`; };
        const subjColor = activeSubjectData?.color || C.accent;
        return (
          <div style={{
            position: "fixed", inset: 0, background: "#0008", zIndex: 100,
            display: "flex", alignItems: "center", justifyContent: "center", padding: 20,
          }} onClick={() => setAutoDistIds(null)}>
            <div style={{ ...card({ maxWidth: 420, width: "100%", maxHeight: "88vh", display: "flex", flexDirection: "column" }) }} onClick={e => e.stopPropagation()}>
              <div style={{ fontFamily: serif, fontSize: 17, color: C.text, marginBottom: 2 }}>вЪ° иЗ™еЛХеИЖйЕН</div>
              <div style={{ fontSize: 12, color: subjColor, marginBottom: 12 }}>
                {activeSubjectData?.name} гГї {units.length}еНШдљН / и®И{fmtH(Math.round(totalH * 60))}
              </div>

              <div style={{ overflowY: "auto", display: "flex", flexDirection: "column", gap: 14 }}>
                {/* Mode toggle */}
                <div style={{ display: "flex", gap: 6 }}>
                  <button onClick={() => setAutoDistMode("deadline")}
                    style={{ ...btn(autoDistMode === "deadline", subjColor, { flex: 1, fontSize: 12, padding: "8px" }) }}>
                    рЯУЕ жЬЯйЩРгБЊгБІгБЂ
                  </button>
                  <button onClick={() => setAutoDistMode("hours")}
                    style={{ ...btn(autoDistMode === "hours", subjColor, { flex: 1, fontSize: 12, padding: "8px" }) }}>
                    вП± 1жЧ•гБВгБЯгВК
                  </button>
                </div>

                {/* Start date */}
                <label style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12, color: C.textMid }}>
                  <span style={{ width: 64 }}>йЦЛеІЛжЧ•</span>
                  <input type="date" value={autoDistStart} min={todayStr()}
                    onChange={e => e.target.value && setAutoDistStart(e.target.value)}
                    style={{ ...input({ flex: 1, fontSize: 13, padding: "7px 10px" }) }} />
                </label>

                {autoDistMode === "deadline" ? (
                  <label style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12, color: C.textMid }}>
                    <span style={{ width: 64 }}>жЬЯйЩР</span>
                    <input type="date" value={autoDistDeadline} min={autoDistStart}
                      onChange={e => e.target.value && setAutoDistDeadline(e.target.value)}
                      style={{ ...input({ flex: 1, fontSize: 13, padding: "7px 10px" }) }} />
                  </label>
                ) : (
                  <label style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12, color: C.textMid }}>
                    <span style={{ width: 64 }}>1жЧ•гБВгБЯгВК</span>
                    <input type="number" min="0.25" step="0.25" value={autoDistHours}
                      onChange={e => setAutoDistHours(e.target.value)}
                      style={{ ...input({ width: 90, fontSize: 13, padding: "7px 10px" }) }} />
                    <span style={{ fontSize: 12 }}>жЩВйЦУ</span>
                  </label>
                )}

                {/* Weekday selector */}
                <div>
                  <div style={{ fontSize: 12, color: C.textMid, marginBottom: 6 }}>дљњгБЖжЫЬжЧ•</div>
                  <div style={{ display: "flex", gap: 4 }}>
                    {DAYS_JA.map((dn, i) => {
                      const on = weekdaysSet.has(i);
                      return (
                        <button key={i} onClick={() => setAutoDistWeekdays(ws =>
                          ws.includes(i) ? ws.filter(x => x !== i) : [...ws, i]
                        )} style={{
                          flex: 1, padding: "7px 0", borderRadius: 6,
                          background: on ? subjColor : C.surfaceUp,
                          border: `1px solid ${on ? subjColor : C.border}`,
                          color: on ? "#fff" : (i === 0 ? C.red : i === 6 ? C.blue : C.textMid),
                          fontFamily: font, fontSize: 12, fontWeight: 700, cursor: "pointer",
                        }}>{dn}</button>
                      );
                    })}
                  </div>
                </div>

                {/* Preview */}
                <div style={{ ...card({ background: C.surfaceUp, padding: 12, marginBottom: 0 }) }}>
                  {placements.length === 0 ? (
                    <div style={{ fontSize: 12, color: C.red }}>
                      жЭ°дїґгБЂеРИгБЖжЧ•гБМгБВгВКгБЊгБЫгВУпЉИжЫЬжЧ•гГїжЬЯйЩРгГїйЦЛеІЛжЧ•гВТзҐЇи™НгБЧгБ¶гБПгБ†гБХгБДпЉЙ
                    </div>
                  ) : (
                    <div style={{ fontSize: 12, color: C.text, lineHeight: 1.7 }}>
                      <div><b>{units.length}</b> еНШдљНгВТ <b>{dayCount}</b> жЧ•гБЂеИЖйЕН</div>
                      {autoDistMode === "deadline"
                        ? <div>1жЧ•еє≥еЭЗ зіД <b>{(totalH / Math.max(1, dayCount)).toFixed(1)}h</b></div>
                        : <div>зµВдЇЖдЇИеЃЪ <b>{lastDate ? fmtMD(lastDate) : "вАУ"}</b></div>}
                    </div>
                  )}
                </div>
              </div>

              <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
                <button onClick={() => setAutoDistIds(null)}
                  style={{ ...btn(false, C.textMid, { flex: 1, padding: "10px" }) }}>гВ≠гГ£гГ≥гВїгГЂ</button>
                <button onClick={runAutoDistribute} disabled={placements.length === 0}
                  style={{ ...btn(true, subjColor, { flex: 1, padding: "10px", opacity: placements.length === 0 ? 0.5 : 1 }) }}>
                  еИЖйЕНгБЩгВЛ
                </button>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

/* вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
   WEEK VIEW
вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР */
function WeekView({ tasks, setTasks, selectedDate, setSelectedDate, weeklyPlans, setWeeklyPlans, subjects, subjectTodos, setView, settings }) {
  const autoMode = (settings?.scheduleMode ?? "auto") === "auto";
  const dates = getWeekDates(selectedDate);
  const today = todayStr();
  const [expandedDate, setExpandedDate] = useState(today);
  const [collapsedSubjects, setCollapsedSubjects] = useState([]);
  const [dayPickerTodo, setDayPickerTodo] = useState(null);
  const [selectMode, setSelectMode] = useState(false);
  const [selectedTodos, setSelectedTodos] = useState([]);
  const [bulkDayPicker, setBulkDayPicker] = useState(false);
  const toggleCollapse = (id) => setCollapsedSubjects(c => c.includes(id) ? c.filter(x => x !== id) : [...c, id]);

  const getTasksForDate = (d) => tasks.filter(t => t.date === d);
  const getDoneCount = (d) => getTasksForDate(d).filter(t => t.done).length;
  const getTotalCount = (d) => getTasksForDate(d).length;

  return (
    <div style={{ padding: 16, maxWidth: 600, margin: "0 auto", display: "flex", flexDirection: "column", gap: 14 }}>
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        <button onClick={() => setSelectedDate(addDays(selectedDate, -7))} style={{ ...btn(), padding: "5px 10px" }}>вАє</button>
        <div style={{ flex: 1, fontFamily: serif, fontSize: 17, color: C.text, textAlign: "center" }}>
          {new Date(dates[0] + "T00:00:00").toLocaleDateString("ja-JP", { month: "long", day: "numeric" })}
          гАЬ
          {new Date(dates[6] + "T00:00:00").toLocaleDateString("ja-JP", { month: "long", day: "numeric" })}
        </div>
        <button onClick={() => setSelectedDate(addDays(selectedDate, 7))} style={{ ...btn(), padding: "5px 10px" }}>вАЇ</button>
        <button onClick={() => setSelectedDate(todayStr())} style={{ ...btn(false, C.accent, { fontSize: 11, padding: "5px 9px" }) }}>дїКйА±</button>
      </div>

      {/* Weekly heatmap */}
      <div style={{ ...card(), padding: 16 }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: C.textMid, marginBottom: 10 }}>дїКйА±гБЃйБФжИРзКґж≥БпЉИгВњгГГгГЧгБІдЇИеЃЪгВТи°®з§ЇпЉЙ</div>
        <div style={{ display: "flex", gap: 6 }}>
          {dates.map(d => {
            const done = getDoneCount(d);
            const total = getTotalCount(d);
            const rate = total ? done / total : 0;
            const isToday = d === today;
            return (
              <button key={d} onClick={() => setExpandedDate(d === expandedDate ? null : d)} style={{
                flex: 1, textAlign: "center", background: "none", border: "none", padding: 0,
                cursor: "pointer", fontFamily: font,
              }}>
                <div style={{ fontSize: 11, color: isToday ? C.accent : C.textDim, fontWeight: isToday ? 700 : 400, marginBottom: 4 }}>
                  {DAYS_JA[new Date(d + "T00:00:00").getDay()]}
                </div>
                <div style={{
                  height: 50, borderRadius: 8, marginBottom: 4,
                  background: total === 0 ? C.surfaceUp :
                    `rgba(${rate >= 0.7 ? "111,207,151" : rate >= 0.4 ? "246,211,101" : "235,87,87"},${0.2 + rate * 0.6})`,
                  border: `2px solid ${d === expandedDate ? C.accent : isToday ? C.accent : C.border}`,
                  display: "flex", alignItems: "center", justifyContent: "center",
                }}>
                  <div style={{ fontSize: 13, fontWeight: 700, color: C.text }}>
                    {total > 0 ? `${done}/${total}` : "вАУ"}
                  </div>
                </div>
                <div style={{ fontSize: 10, color: C.textDim }}>
                  {new Date(d + "T00:00:00").getDate()}
                </div>
              </button>
            );
          })}
        </div>
      </div>

      {/* Expanded day tasks */}
      {expandedDate && (() => {
        const dayTasks = tasks.filter(t => t.date === expandedDate).sort((a, b) => (a.hour ?? 99) - (b.hour ?? 99));
        const dateObj = new Date(expandedDate + "T00:00:00");
        const priorityColor = { high: C.red, medium: C.yellow, low: C.green };
        return (
          <div style={card()}>
            <div style={{ display: "flex", alignItems: "center", marginBottom: 10 }}>
              <div style={{ flex: 1, fontSize: 13, fontWeight: 700, color: C.accent }}>
                {dateObj.toLocaleDateString("ja-JP", { month: "long", day: "numeric" })}({DAYS_JA[dateObj.getDay()]})гБЃдЇИеЃЪ
              </div>
              <button onClick={() => { setSelectedDate(expandedDate); setView("day"); }}
                style={{ ...btn(false, C.accent, { fontSize: 10, padding: "3px 8px" }) }}>зЈ®йЫЖ вЖТ</button>
            </div>
            {dayTasks.length === 0 ? (
              <div style={{ fontSize: 12, color: C.textDim, textAlign: "center", padding: 10 }}>дЇИеЃЪгБ™гБЧ</div>
            ) : dayTasks.map(t => {
              const subjData = t.subjectId && subjects.find(s => s.id === t.subjectId);
              return (
                <div key={t.id} style={{
                  display: "flex", alignItems: "center", gap: 8, padding: "8px 0",
                  borderBottom: `1px solid ${C.border}`, opacity: t.done ? 0.55 : 1,
                }}>
                  <div style={{ fontSize: 11, color: C.textMid, fontFamily: font, minWidth: 78, fontVariantNumeric: "tabular-nums" }}>
                    {fmtTime(t.hour)}гАЬ{fmtTime(t.hour + t.duration)}
                  </div>
                  <div style={{ flex: 1, fontSize: 13, color: C.text, textDecoration: t.done ? "line-through" : "none" }}>
                    {t.kind === "other" && <span style={{ color: C.textMid, marginRight: 4 }}>рЯУМ</span>}
                    {t.title}
                    {subjData && <span style={{ color: subjData.color, marginLeft: 6, fontSize: 11 }}>вАҐ {subjData.name}</span>}
                  </div>
                  {t.done && <span style={{ color: C.green, fontSize: 13 }}>вЬУ</span>}
                </div>
              );
            })}
          </div>
        );
      })()}

      {/* Auto mode: read-only summary of this week's scheduled tasks by subject */}
      {autoMode && (() => {
        const fmtHr = (h) => { const m = Math.round(h * 60); return m >= 60 ? `${Math.floor(m/60)}h${m%60 ? (m%60)+"m" : ""}` : `${m}m`; };
        const weekTasks = tasks.filter(t => dates.includes(t.date) && t.kind !== "other");
        if (weekTasks.length === 0) return (
          <div style={{ ...card(), textAlign: "center", padding: 20, fontSize: 12, color: C.textMid }}>
            дїКйА±гБЃдЇИеЃЪгБѓгБЊгБ†гБВгВКгБЊгБЫгВУ<br/>
            <span style={{ fontSize: 11, color: C.textDim }}>гАМрЯУЪ зІСзЫЃгАНзФїйЭҐгБЃ <span style={{ color: C.accent }}>вЪ°иЗ™еЛХеИЖйЕН</span> гБІдЇИеЃЪгВТзµДгВБгБЊгБЩ</span>
          </div>
        );
        const totalH = weekTasks.reduce((s, t) => s + (t.duration || 0), 0);
        const doneH = weekTasks.filter(t => t.done).reduce((s, t) => s + (t.duration || 0), 0);
        const groups = subjects.map(s => {
          const ts = weekTasks.filter(t => t.subjectId === s.id).sort((a, b) => a.date.localeCompare(b.date));
          if (!ts.length) return null;
          return { subject: s, tasks: ts, totalH: ts.reduce((x, t) => x + (t.duration || 0), 0), doneH: ts.filter(t => t.done).reduce((x, t) => x + (t.duration || 0), 0) };
        }).filter(Boolean);
        const orphan = weekTasks.filter(t => !t.subjectId || !subjects.some(s => s.id === t.subjectId));
        if (orphan.length) groups.push({ subject: { id: "_orphan", name: "гБЭгБЃдїЦ", color: C.textMid }, tasks: orphan.sort((a, b) => a.date.localeCompare(b.date)), totalH: orphan.reduce((x, t) => x + (t.duration || 0), 0), doneH: orphan.filter(t => t.done).reduce((x, t) => x + (t.duration || 0), 0) });
        return (
          <>
            <div style={{ ...card(), padding: 14, background: C.accent + "10", borderColor: C.accent + "40" }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: C.accent, marginBottom: 6 }}>рЯУЖ дїКйА±гВДгВЛгБУгБ®</div>
              <div style={{ display: "flex", alignItems: "baseline", gap: 10, flexWrap: "wrap" }}>
                <span style={{ fontSize: 13, color: C.text }}>{weekTasks.length}дїґ</span>
                <span style={{ fontSize: 13, color: C.text }}>и®И <b>{fmtHr(totalH)}</b></span>
                <span style={{ fontSize: 12, color: C.green }}>еЃМдЇЖ {fmtHr(doneH)}</span>
                <span style={{ fontSize: 12, color: C.textMid }}>жЃЛ {fmtHr(Math.max(0, totalH - doneH))}</span>
              </div>
              <div style={{ height: 5, background: C.border, borderRadius: 3, marginTop: 8, overflow: "hidden" }}>
                <div style={{ width: totalH ? `${(doneH / totalH) * 100}%` : "0%", height: "100%", background: C.green }} />
              </div>
            </div>
            {groups.map(g => {
              const collapsed = collapsedSubjects.includes(g.subject.id);
              return (
                <div key={g.subject.id} style={{ ...card(), borderLeft: `4px solid ${g.subject.color}` }}>
                  <div onClick={() => toggleCollapse(g.subject.id)}
                    style={{ display: "flex", alignItems: "center", marginBottom: collapsed ? 0 : 8, cursor: "pointer", gap: 8 }}>
                    <div style={{ fontSize: 11, color: C.textDim, width: 14 }}>{collapsed ? "вЦґ" : "вЦЉ"}</div>
                    <div style={{ flex: 1, fontSize: 14, fontWeight: 700, color: C.text }}>
                      {g.subject.name}
                      <span style={{ fontSize: 11, color: C.textMid, marginLeft: 6, fontWeight: 400 }}>({g.tasks.length}дїґ)</span>
                    </div>
                    <div style={{ fontSize: 11, color: C.textMid }}>жЃЛ <span style={{ color: g.subject.color, fontWeight: 700 }}>{fmtHr(Math.max(0, g.totalH - g.doneH))}</span></div>
                  </div>
                  {!collapsed && g.tasks.map(t => {
                    const d = new Date(t.date + "T00:00:00");
                    return (
                      <div key={t.id} style={{
                        display: "flex", alignItems: "center", gap: 8, padding: "6px 0",
                        borderBottom: `1px solid ${C.border}`, opacity: t.done ? 0.5 : 1,
                      }}>
                        <span style={{ fontSize: 11, color: C.textMid, minWidth: 40 }}>{d.getMonth() + 1}/{d.getDate()}({DAYS_JA[d.getDay()]})</span>
                        <span style={{ flex: 1, fontSize: 13, color: C.text, textDecoration: t.done ? "line-through" : "none" }}>
                          {t.isReview && <span style={{ color: C.yellow, marginRight: 4 }}>рЯФБ</span>}{t.title}
                        </span>
                        <span style={{ fontSize: 11, color: g.subject.color }}>{fmtHr(t.duration || 0)}</span>
                        {t.done && <span style={{ color: C.green, fontSize: 12 }}>вЬУ</span>}
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </>
        );
      })()}

      {/* Weekly TODOs grouped by subject (manual mode) */}
      {!autoMode && (() => {
        const thisWeekStart = dates[0];
        const thisWeekPlans = weeklyPlans.filter(p => p.weekStart === thisWeekStart);
        if (thisWeekPlans.length === 0) return (
          <div style={{ ...card(), textAlign: "center", padding: 20, fontSize: 12, color: C.textMid }}>
            гАМрЯУЕ жЬИжђ°гАНгБЊгБЯгБѓгАМрЯУЪ зІСзЫЃгАНзФїйЭҐгБЃ <span style={{ color: C.blue }}>йА±</span> гГЬгВњгГ≥гБІдїКйА±гВДгВЛTODOгВТињљеК†гБІгБНгБЊгБЩ
          </div>
        );
        const fmtH = (m) => m >= 60 ? `${Math.floor(m/60)}h${m%60 ? (m%60)+"m" : ""}` : `${m}m`;
        const subjectGroups = subjects.map(s => {
          const plans = thisWeekPlans.filter(p => p.subjectId === s.id);
          if (plans.length === 0) return null;
          const todoData = plans.map(p => ({ plan: p, todo: subjectTodos.find(t => t.id === p.todoId) })).filter(x => x.todo);
          const totalMin = todoData.reduce((sum, x) => sum + (x.todo.minutes || 0), 0);
          const doneMin = todoData.filter(x => { const s = x.todo.status || (x.todo.done ? "done" : "unwatched"); return s === "done" || s === "reviewing"; }).reduce((sum, x) => sum + (x.todo.minutes || 0), 0);
          const inDay = (todoId) => tasks.some(t => dates.includes(t.date) && t.subjectTodoId === todoId);
          return { subject: s, todoData, totalMin, doneMin, inDay };

                    </button>

            </div>
            {subjectGroups.map(g => {
          const collapsed = collapsedSubjects.includes(g.subject.id);
          return (
          <div key={g.subject.id} style={{ ...card(), borderLeft: `4px solid ${g.subject.color}` }}>

              <div style={{ flex: 1, fontSize: 14, fontWeight: 700, color: C.text }}>
                {g.subject.name}
                {collapsed && <span style={{ fontSize: 11, color: C.textMid, marginLeft: 6, fontWeight: 400 }}>({g.todoData.length}дїґ)</span>}
              </div>
              <div style={{ fontSize: 11, color: C.textMid }}>
                {fmtH(g.doneMin)} еЃМдЇЖ / жЃЛ <span style={{ color: g.subject.color, fontWeight: 700 }}>{fmtH(Math.max(0, g.totalMin - g.doneMin))}</span>
              </div>
            </div>
            {!collapsed && (
              <>
                <div style={{ height: 4, background: C.border, borderRadius: 2, marginBottom: 10, overflow: "hidden" }}>
                  <div style={{ width: g.totalMin ? `${(g.doneMin / g.totalMin) * 100}%` : "0%", height: "100%", background: g.subject.color }} />
                </div>
                {g.todoData.map(({ plan, todo }) => {
                  const st = todo.status || (todo.done ? "done" : "unwatched");
                  const isInDay = g.inDay(todo.id);
                  const isSelected = selectedTodos.includes(todo.id);
                  return (
                    <div key={plan.id} style={{
                      display: "flex", alignItems: "center", gap: 8, padding: "6px 0",
                      borderBottom: `1px solid ${C.border}`, opacity: st === "done" ? 0.55 : 1,
                    }}>
                      {selectMode && (
                        <button onClick={() => setSelectedTodos(sel =>
                          sel.includes(todo.id) ? sel.filter(x => x !== todo.id) : [...sel, todo.id]
                        )} style={{
                          width: 22, height: 22, borderRadius: 4,
                          border: `2px solid ${isSelected ? C.purple : C.border}`,
                          background: isSelected ? C.purple : "transparent",
                          color: "#fff", fontSize: 12, fontWeight: 700,
                          cursor: "pointer", flexShrink: 0, padding: 0,
                          display: "flex", alignItems: "center", justifyContent: "center",
                        }}>{isSelected ? "вЬУ" : ""}</button>
                      )}
                      <span style={{ fontSize: 13, color: C.text, flex: 1, textDecoration: st === "done" ? "line-through" : "none" }}>
                        {todo.text}
                      </span>
                      {todo.minutes && <span style={{ fontSize: 11, color: g.subject.color }}>{fmtH(todo.minutes)}</span>}
                      {!selectMode && (
                        <>
                          <button onClick={() => setDayPickerTodo(todo)}
                            style={{ ...btn(isInDay, C.accent, { padding: "3px 8px", fontSize: 10 }) }}>

                          </button>
                          <button onClick={() => setWeeklyPlans(ps => ps.filter(p => p.id !== plan.id))}
                            style={{ ...btn(false, C.red, { padding: "3px 6px", fontSize: 10 }) }}>вЬХ</button>
                        </>
                      )}
                    </div>
                  );
                })}
              </>
            )}
          </div>
          );
        })}
          </>
        );
      })()}

      {/* Day picker modal */}
      {dayPickerTodo && (() => {
        const todo = dayPickerTodo;
        const subjData = subjects.find(s => s.id === todo.subjectId);
        const inDay = (d) => tasks.some(t => t.date === d && t.subjectTodoId === todo.id);
        return (
          <div style={{
            position: "fixed", inset: 0, background: "#0008", zIndex: 100,

              <div style={{ fontFamily: serif, fontSize: 16, color: C.text, marginBottom: 4 }}>жЧ•гВТйБЄгВУгБІдЇИеЃЪ</div>
              <div style={{ fontSize: 12, color: subjData?.color || C.accent, marginBottom: 12 }}>{todo.text}</div>
              <div style={{ overflowY: "auto", display: "flex", flexDirection: "column", gap: 6 }}>
                {dates.map(d => {
                  const dObj = new Date(d + "T00:00:00");
                  const isIn = inDay(d);
                  const isTodayD = d === today;
                  const isPast = d < today;
                  const dayName = DAYS_JA[dObj.getDay()];
                  return (
                    <button key={d} onClick={() => {
                      if (isIn) {
                        // Toggle off: remove this todo's task on that day
                        setTasks(ts => ts.filter(t => !(t.date === d && t.subjectTodoId === todo.id)));
                        return;
                      }
                      const childMin = subjectTodos.filter(c => c.parentId === todo.id).reduce((s, c) => s + (c.minutes || 0), 0);
                      const totalMin = (todo.minutes || 0) + childMin;
                      const dur = totalMin ? Math.max(1/60, totalMin / 60) : 1;
                      setTasks(ts => [...ts, {
                        id: genId(), date: d, title: buildTaskTitle(todo, subjects),
                        hour: null, duration: dur, priority: "medium",
                        actual: null, done: false, note: "",
                        goalId: null, kind: "study", subjectId: todo.subjectId, subjectTodoId: todo.id,
                      }]);
                    }} style={{
                      padding: "10px 14px", borderRadius: 8,
                      background: isIn ? C.accent : C.surfaceUp,
                      border: `1px solid ${isIn ? C.accent : C.border}`,
                      color: isIn ? "#fff" : isPast ? C.textDim : C.text,
                      fontFamily: font, fontSize: 13,
                      cursor: "pointer",
                      display: "flex", alignItems: "center", gap: 8,
                    }}>
                      <span style={{ flex: 1, textAlign: "left" }}>
                        {dObj.getMonth() + 1}/{dObj.getDate()}({dayName})
                      </span>
                      {isTodayD && <span style={{ fontSize: 10, opacity: 0.85 }}>дїКжЧ•</span>}
                      {isIn && <span>вЬУ ињљеК†жЄИ</span>}
                    </button>
                  );
                })}
              </div>
              <button onClick={() => setDayPickerTodo(null)}
                style={{ ...btn(false, C.textMid, { width: "100%", padding: "9px", marginTop: 12 }) }}>йЦЙгБШгВЛ</button>
            </div>
          </div>
        );
      })()}

      {/* Bulk day picker modal */}
      {bulkDayPicker && (() => {
        const selTodos = subjectTodos.filter(t => selectedTodos.includes(t.id));
        const totalMin = selTodos.reduce((s, t) => s + (t.minutes || 0), 0);
        const fmtH = (m) => m >= 60 ? `${Math.floor(m/60)}h${m%60 ? (m%60)+"m" : ""}` : `${m}m`;
        const today0 = new Date(today + "T00:00:00");
        return (
          <div style={{
            position: "fixed", inset: 0, background: "#0008", zIndex: 100,
            display: "flex", alignItems: "center", justifyContent: "center", padding: 20,
          }} onClick={() => setBulkDayPicker(false)}>
            <div style={{ ...card({ maxWidth: 420, width: "100%", maxHeight: "85vh", display: "flex", flexDirection: "column" }) }} onClick={e => e.stopPropagation()}>
              <div style={{ fontFamily: serif, fontSize: 16, color: C.text, marginBottom: 4 }}>жЧ•гБЂгБЊгБ®гВБгБ¶ињљеК†</div>
              <div style={{ fontSize: 12, color: C.accent, marginBottom: 12 }}>
                {selTodos.length}дїґ / {fmtH(totalMin)}
              </div>
              <div style={{ overflowY: "auto", display: "flex", flexDirection: "column", gap: 6 }}>
                {dates.map(d => {
                  const dObj = new Date(d + "T00:00:00");
                  const dayName = DAYS_JA[dObj.getDay()];
                  const isTodayD = d === today;
                  const isPast = dObj < today0;
                  const inCount = selTodos.filter(t => tasks.some(task => task.date === d && task.subjectTodoId === t.id)).length;
                  return (
                    <button key={d} onClick={() => {
                      const newTasks = [];
                      selTodos.forEach(t => {
                        if (!tasks.some(task => task.date === d && task.subjectTodoId === t.id)) {
                          const childMin = subjectTodos.filter(c => c.parentId === t.id).reduce((s, c) => s + (c.minutes || 0), 0);
                          const totalMin = (t.minutes || 0) + childMin;
                          const dur = totalMin ? Math.max(1/60, totalMin / 60) : 1;
                          const subj = subjects.find(s => s.id === t.subjectId);
                          const title = (subj && subj.category && subj.category !== "CPAеЛЙеЉЈ") ? `${subj.name} ${t.text}` : t.text;
                          newTasks.push({
                            id: genId(), date: d, title,
                            hour: null, duration: dur, priority: "mid",
                            goalId: null, kind: "study", subjectId: t.subjectId, subjectTodoId: t.id,
                          });
                        }
                      });
                      if (newTasks.length) setTasks(ts => [...ts, ...newTasks]);
                    }} style={{
                      padding: "10px 14px", borderRadius: 8,
                      background: inCount === selTodos.length ? C.accent : C.surfaceUp,
                      border: `1px solid ${inCount > 0 ? C.accent : C.border}`,
                      color: inCount === selTodos.length ? "#fff" : isPast ? C.textDim : C.text,
                      fontFamily: font, fontSize: 13, cursor: "pointer",
                      display: "flex", alignItems: "center", gap: 8,
                    }}>
                      <span style={{ flex: 1, textAlign: "left" }}>
                        {dObj.getMonth() + 1}/{dObj.getDate()}({dayName})
                      </span>
                      {isTodayD && <span style={{ fontSize: 10, opacity: 0.85 }}>дїКжЧ•</span>}
                      {inCount > 0 && <span style={{ fontSize: 11 }}>{inCount}/{selTodos.length}</span>}
                    </button>
                  );
                })}
              </div>
              <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                <button onClick={() => setBulkDayPicker(false)}
                  style={{ ...btn(false, C.textMid, { flex: 1, padding: "9px" }) }}>гВ≠гГ£гГ≥гВїгГЂ</button>
                <button onClick={() => { setBulkDayPicker(false); setSelectMode(false); setSelectedTodos([]); }}
                  style={{ ...btn(true, C.accent, { flex: 1, padding: "9px" }) }}>еЃМдЇЖ</button>
              </div>
            </div>
          </div>
        );
      })()}

    </div>
  );
}

/* вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
   MONTH VIEW
вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР */
function MonthView({ goals, monthlyPlans, setMonthlyPlans, weeklyPlans, setWeeklyPlans, subjects, subjectTodos, setView, selectedDate, tasks, settings }) {
  const autoMode = (settings?.scheduleMode ?? "auto") === "auto";
  const [monthOffset, setMonthOffset] = useState(0); // 0 = this month, 1 = next, etc.
  const [collapsedSubjects, setCollapsedSubjects] = useState([]);
  const [weekPickerTodo, setWeekPickerTodo] = useState(null);
  const [selectMode, setSelectMode] = useState(false);
  const [selectedTodos, setSelectedTodos] = useState([]);
  const [bulkWeekPicker, setBulkWeekPicker] = useState(false);
  const today = todayStr();
  const toggleCollapse = (id) => setCollapsedSubjects(c => c.includes(id) ? c.filter(x => x !== id) : [...c, id]);

  // Calendar for viewing month (with offset)
  const now = new Date();
  const viewingDate = new Date(now.getFullYear(), now.getMonth() + monthOffset, 1);
  const year = viewingDate.getFullYear();
  const month = viewingDate.getMonth();
  const thisMonth = `${year}-${String(month + 1).padStart(2, "0")}`;
  const daysInMonth = new Date(year, month + 1, 0).getDate();
  const days = Array.from({ length: daysInMonth }, (_, i) => {
    const d = new Date(year, month, i + 1);
    return d.toISOString().split("T")[0];
  });
  const weekDates = getWeekDates(selectedDate);
  const isViewingCurrentMonth = monthOffset === 0;

  return (
    <div style={{ padding: 16, maxWidth: 600, margin: "0 auto", display: "flex", flexDirection: "column", gap: 14 }}>
      {/* Month navigation */}
      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
        <button onClick={() => setMonthOffset(o => o - 12)} style={{ ...btn(), padding: "5px 8px", fontSize: 11 }}>вАєвАє 1еєі</button>
        <button onClick={() => setMonthOffset(o => o - 1)} style={{ ...btn(), padding: "5px 10px" }}>вАє</button>
        <div style={{ flex: 1, textAlign: "center" }}>
          <div style={{ fontFamily: serif, fontSize: 18, color: C.text }}>
            {year !== now.getFullYear() && <span style={{ fontSize: 13, color: C.textMid, marginRight: 4 }}>{year}еєі</span>}
            {MONTHS_JA[month]}
            {isViewingCurrentMonth && <span style={{ color: C.accent, fontSize: 12, marginLeft: 6 }}>вАҐ дїКжЬИ</span>}
            {monthOffset !== 0 && <span style={{ color: C.textDim, fontSize: 11, marginLeft: 6 }}>
              ({monthOffset > 0 ? `+${monthOffset}гГґжЬИ` : `${monthOffset}гГґжЬИ`})
            </span>}
          </div>
        </div>
        <button onClick={() => setMonthOffset(o => o + 1)} style={{ ...btn(), padding: "5px 10px" }}>вАЇ</button>
        <button onClick={() => setMonthOffset(o => o + 12)} style={{ ...btn(), padding: "5px 8px", fontSize: 11 }}>1еєі вАЇвАЇ</button>
      </div>
      <div style={{ display: "flex", gap: 5, overflowX: "auto" }}>
        <button onClick={() => setMonthOffset(0)} style={{ ...btn(isViewingCurrentMonth, C.accent, { fontSize: 11, padding: "4px 10px", whiteSpace: "nowrap" }) }}>дїКжЬИ</button>
        <button onClick={() => setMonthOffset(1)} style={{ ...btn(monthOffset === 1, C.textMid, { fontSize: 11, padding: "4px 10px", whiteSpace: "nowrap" }) }}>жЭ•жЬИ</button>
        <button onClick={() => setMonthOffset(2)} style={{ ...btn(monthOffset === 2, C.textMid, { fontSize: 11, padding: "4px 10px", whiteSpace: "nowrap" }) }}>еЖНжЭ•жЬИ</button>
        <button onClick={() => setMonthOffset(3)} style={{ ...btn(monthOffset === 3, C.textMid, { fontSize: 11, padding: "4px 10px", whiteSpace: "nowrap" }) }}>3гГґжЬИеЊМ</button>
        <button onClick={() => setMonthOffset(6)} style={{ ...btn(monthOffset === 6, C.textMid, { fontSize: 11, padding: "4px 10px", whiteSpace: "nowrap" }) }}>еНКеєіеЊМ</button>
        <button onClick={() => setMonthOffset(12)} style={{ ...btn(monthOffset === 12, C.textMid, { fontSize: 11, padding: "4px 10px", whiteSpace: "nowrap" }) }}>1еєіеЊМ</button>
      </div>

      {/* Auto mode: read-only summary of this month's scheduled tasks */}
      {autoMode && (() => {
        const fmtHr = (h) => { const m = Math.round(h * 60); return m >= 60 ? `${Math.floor(m/60)}h${m%60 ? (m%60)+"m" : ""}` : `${m}m`; };
        const monthTasks = tasks.filter(t => t.date.slice(0, 7) === thisMonth && t.kind !== "other");
        if (monthTasks.length === 0) return (
          <div style={{ ...card(), textAlign: "center", padding: 20, fontSize: 12, color: C.textMid }}>
            {isViewingCurrentMonth ? "дїКжЬИ" : MONTHS_JA[month]}гБЃдЇИеЃЪгБѓгБЊгБ†гБВгВКгБЊгБЫгВУ<br/>
            <span style={{ fontSize: 11, color: C.textDim }}>гАМрЯУЪ зІСзЫЃгАНзФїйЭҐгБЃ <span style={{ color: C.accent }}>вЪ°иЗ™еЛХеИЖйЕН</span> гБІдЇИеЃЪгВТзµДгВБгБЊгБЩ</span>
          </div>
        );
        const totalH = monthTasks.reduce((s, t) => s + (t.duration || 0), 0);
        const doneH = monthTasks.filter(t => t.done).reduce((s, t) => s + (t.duration || 0), 0);
        const groups = subjects.map(s => {
          const ts = monthTasks.filter(t => t.subjectId === s.id).sort((a, b) => a.date.localeCompare(b.date));
          if (!ts.length) return null;
          return { subject: s, tasks: ts, totalH: ts.reduce((x, t) => x + (t.duration || 0), 0), doneH: ts.filter(t => t.done).reduce((x, t) => x + (t.duration || 0), 0) };
        }).filter(Boolean);
        const orphan = monthTasks.filter(t => !t.subjectId || !subjects.some(s => s.id === t.subjectId));
        if (orphan.length) groups.push({ subject: { id: "_orphan", name: "гБЭгБЃдїЦ", color: C.textMid }, tasks: orphan.sort((a, b) => a.date.localeCompare(b.date)), totalH: orphan.reduce((x, t) => x + (t.duration || 0), 0), doneH: orphan.filter(t => t.done).reduce((x, t) => x + (t.duration || 0), 0) });
        return (
          <>
            <div style={{ ...card(), padding: 14, background: C.accent + "10", borderColor: C.accent + "40" }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: C.accent, marginBottom: 6 }}>
                рЯУЕ {isViewingCurrentMonth ? "дїКжЬИ" : MONTHS_JA[month]}гВДгВЛгБУгБ®
              </div>
              <div style={{ display: "flex", alignItems: "baseline", gap: 10, flexWrap: "wrap" }}>
                <span style={{ fontSize: 13, color: C.text }}>{monthTasks.length}дїґ</span>
                <span style={{ fontSize: 13, color: C.text }}>и®И <b>{fmtHr(totalH)}</b></span>
                <span style={{ fontSize: 12, color: C.green }}>еЃМдЇЖ {fmtHr(doneH)}</span>
                <span style={{ fontSize: 12, color: C.textMid }}>жЃЛ {fmtHr(Math.max(0, totalH - doneH))}</span>
              </div>
              <div style={{ height: 5, background: C.border, borderRadius: 3, marginTop: 8, overflow: "hidden" }}>
                <div style={{ width: totalH ? `${(doneH / totalH) * 100}%` : "0%", height: "100%", background: C.green }} />
              </div>
            </div>
            {groups.map(g => {
              const collapsed = collapsedSubjects.includes(g.subject.id);
              return (
                <div key={g.subject.id} style={{ ...card(), borderLeft: `4px solid ${g.subject.color}` }}>
                  <div onClick={() => toggleCollapse(g.subject.id)}
                    style={{ display: "flex", alignItems: "center", marginBottom: collapsed ? 0 : 10, cursor: "pointer", gap: 8 }}>
                    <div style={{ fontSize: 11, color: C.textDim, width: 14 }}>{collapsed ? "вЦґ" : "вЦЉ"}</div>
                    <div style={{ flex: 1, fontSize: 14, fontWeight: 700, color: C.text }}>
                      {g.subject.name}
                      <span style={{ fontSize: 11, color: C.textMid, marginLeft: 6, fontWeight: 400 }}>({g.tasks.length}дїґ)</span>
                    </div>
                    <div style={{ fontSize: 11, color: C.textMid }}>
                      жЃЛ <span style={{ color: g.subject.color, fontWeight: 700 }}>{fmtHr(Math.max(0, g.totalH - g.doneH))}</span>
                    </div>
                  </div>
                  {!collapsed && g.tasks.map(t => {
                    const d = new Date(t.date + "T00:00:00");
                    return (
                      <div key={t.id} style={{
                        display: "flex", alignItems: "center", gap: 8, padding: "6px 0",
                        borderBottom: `1px solid ${C.border}`, opacity: t.done ? 0.5 : 1,
                      }}>
                        <span style={{ fontSize: 11, color: C.textMid, minWidth: 52, fontVariantNumeric: "tabular-nums" }}>
                          {d.getMonth() + 1}/{d.getDate()}({DAYS_JA[d.getDay()]})
                        </span>
                        <span style={{ flex: 1, fontSize: 13, color: C.text, textDecoration: t.done ? "line-through" : "none" }}>
                          {t.isReview && <span style={{ color: C.yellow, marginRight: 4 }}>рЯФБ</span>}{t.title}
                        </span>
                        <span style={{ fontSize: 11, color: g.subject.color }}>{fmtHr(t.duration || 0)}</span>
                        {t.done && <span style={{ color: C.green, fontSize: 12 }}>вЬУ</span>}
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </>
        );
      })()}

      {/* Monthly TODOs grouped by subject (manual mode) */}
      {!autoMode && (() => {
        const thisMonthPlans = monthlyPlans.filter(p => p.month === thisMonth);
        if (thisMonthPlans.length === 0) return (
          <div style={{ ...card(), textAlign: "center", padding: 20, fontSize: 12, color: C.textMid }}>
            {isViewingCurrentMonth ? "дїКжЬИ" : `${MONTHS_JA[month]}`}гБЃTODOгБМгБВгВКгБЊгБЫгВУ<br/>
            <span style={{ fontSize: 11, color: C.textDim }}>гАМрЯУЪ зІСзЫЃгАНзФїйЭҐгБЃ <span style={{ color: C.purple }}>жЬИ</span> гГЬгВњгГ≥гБІињљеК†гБІгБНгБЊгБЩ</span>
          </div>
        );
        const fmtH = (m) => m >= 60 ? `${Math.floor(m/60)}h${m%60 ? (m%60)+"m" : ""}` : `${m}m`;
        const subjectGroups = subjects.map(s => {
          const plans = thisMonthPlans.filter(p => p.subjectId === s.id);
          if (plans.length === 0) return null;
          const todoData = plans.map(p => ({ plan: p, todo: subjectTodos.find(t => t.id === p.todoId) })).filter(x => x.todo);
          const totalMin = todoData.reduce((sum, x) => sum + (x.todo.minutes || 0), 0);
          const doneMin = todoData.filter(x => { const s = x.todo.status || (x.todo.done ? "done" : "unwatched"); return s === "done" || s === "reviewing"; }).reduce((sum, x) => sum + (x.todo.minutes || 0), 0);
          const inWeek = (todoId) => weeklyPlans.some(wp => weekDates.includes(wp.weekStart) && wp.todoId === todoId);
          return { subject: s, todoData, totalMin, doneMin, inWeek };
        }).filter(Boolean);

        const allTodoIds = subjectGroups.flatMap(g => g.todoData.map(d => d.todo.id));

        return (
          <>
            <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
              <button onClick={() => { setSelectMode(s => !s); setSelectedTodos([]); }}
                style={{ ...btn(selectMode, C.purple, { fontSize: 11, padding: "5px 10px" }) }}>
                {selectMode ? "вЬХ йБЄжКЮзµВдЇЖ" : "вШС и§ЗжХ∞йБЄжКЮ"}
              </button>
              {selectMode && (
                <>
                  <button onClick={() => setSelectedTodos(allTodoIds)}
                    style={{ ...btn(false, C.textMid, { fontSize: 11, padding: "5px 10px" }) }}>
                    еЕ®йБЄжКЮ
                  </button>
                  <div style={{ flex: 1, fontSize: 11, color: C.textMid, textAlign: "right" }}>
                    {selectedTodos.length}дїґйБЄжКЮдЄ≠
                  </div>
                  {selectedTodos.length > 0 && (
                    <button onClick={() => setBulkWeekPicker(true)}
                      style={{ ...btn(true, C.blue, { fontSize: 11, padding: "5px 10px" }) }}>
                      рЯУЖ йА±гБЂињљеК†
                    </button>
                  )}
                </>
              )}
            </div>
            {subjectGroups.map(g => {
          const collapsed = collapsedSubjects.includes(g.subject.id);
          return (
          <div key={g.subject.id} style={{ ...card(), borderLeft: `4px solid ${g.subject.color}` }}>
            <div onClick={() => toggleCollapse(g.subject.id)}
              style={{ display: "flex", alignItems: "center", marginBottom: collapsed ? 0 : 10, cursor: "pointer", gap: 8 }}>
              <div style={{ fontSize: 11, color: C.textDim, width: 14 }}>{collapsed ? "вЦґ" : "вЦЉ"}</div>
              <div style={{ flex: 1, fontSize: 14, fontWeight: 700, color: C.text }}>
                {g.subject.name}
                {collapsed && <span style={{ fontSize: 11, color: C.textMid, marginLeft: 6, fontWeight: 400 }}>({g.todoData.length}дїґ)</span>}
              </div>
              <div style={{ fontSize: 11, color: C.textMid }}>
                {fmtH(g.doneMin)} еЃМдЇЖ / жЃЛ <span style={{ color: g.subject.color, fontWeight: 700 }}>{fmtH(Math.max(0, g.totalMin - g.doneMin))}</span>
              </div>
            </div>
            {!collapsed && (
              <>
                <div style={{ height: 4, background: C.border, borderRadius: 2, marginBottom: 10, overflow: "hidden" }}>
                  <div style={{ width: g.totalMin ? `${(g.doneMin / g.totalMin) * 100}%` : "0%", height: "100%", background: g.subject.color }} />
                </div>
                {g.todoData.map(({ plan, todo }) => {
                  const st = todo.status || (todo.done ? "done" : "unwatched");
                  const isInWeek = g.inWeek(todo.id);
                  const isSelected = selectedTodos.includes(todo.id);
                  return (
                    <div key={plan.id} style={{
                      display: "flex", alignItems: "center", gap: 8, padding: "6px 0",
                      borderBottom: `1px solid ${C.border}`, opacity: st === "done" ? 0.55 : 1,
                    }}>
                      {selectMode && (
                        <button onClick={() => setSelectedTodos(sel =>
                          sel.includes(todo.id) ? sel.filter(x => x !== todo.id) : [...sel, todo.id]
                        )} style={{
                          width: 22, height: 22, borderRadius: 4,
                          border: `2px solid ${isSelected ? C.purple : C.border}`,
                          background: isSelected ? C.purple : "transparent",
                          color: "#fff", fontSize: 12, fontWeight: 700,
                          cursor: "pointer", flexShrink: 0, padding: 0,
                          display: "flex", alignItems: "center", justifyContent: "center",
                        }}>{isSelected ? "вЬУ" : ""}</button>
                      )}
                      <span style={{ fontSize: 13, color: C.text, flex: 1, textDecoration: st === "done" ? "line-through" : "none" }}>
                        {todo.text}
                      </span>
                      {todo.minutes && <span style={{ fontSize: 11, color: g.subject.color }}>{fmtH(todo.minutes)}</span>}
                      {!selectMode && (
                        <>
                          <button onClick={() => setWeekPickerTodo(todo)}
                            style={{ ...btn(isInWeek, C.blue, { padding: "3px 8px", fontSize: 10 }) }}>
                            {isInWeek ? "йА±жђ°жЄИ" : "йА±жђ°вЖТ"}
                          </button>
                          <button onClick={() => setMonthlyPlans(ps => ps.filter(p => p.id !== plan.id))}
                            style={{ ...btn(false, C.red, { padding: "3px 6px", fontSize: 10 }) }}>вЬХ</button>
                        </>
                      )}
                    </div>
                  );
                })}
              </>
            )}
          </div>
          );
        })}
          </>
        );
      })()}

      {/* Week picker modal */}
      {weekPickerTodo && (() => {
        const todo = weekPickerTodo;
        const subjData = subjects.find(s => s.id === todo.subjectId);
        const fmtLocal = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
        const firstOfMonth = new Date(year, month, 1);
        const firstMon = new Date(firstOfMonth);
        firstMon.setDate(firstOfMonth.getDate() - ((firstOfMonth.getDay() + 6) % 7));
        const weeks = Array.from({ length: 10 }, (_, i) => {
          const wStart = new Date(firstMon);
          wStart.setDate(firstMon.getDate() + i * 7);
          const wEnd = new Date(wStart);
          wEnd.setDate(wStart.getDate() + 6);
          const startStr = fmtLocal(wStart);
          return { startStr, wStart, wEnd, ended: wEnd < new Date(today + "T00:00:00") };
        }).filter(w => !w.ended);
        const inWeek = (wStart) => weeklyPlans.some(p => p.weekStart === wStart && p.todoId === todo.id);
        return (
          <div style={{
            position: "fixed", inset: 0, background: "#0008", zIndex: 100,
            display: "flex", alignItems: "center", justifyContent: "center", padding: 20,
          }} onClick={() => setWeekPickerTodo(null)}>
            <div style={{ ...card({ maxWidth: 420, width: "100%", maxHeight: "80vh", display: "flex", flexDirection: "column" }) }} onClick={e => e.stopPropagation()}>
              <div style={{ fontFamily: serif, fontSize: 16, color: C.text, marginBottom: 4 }}>йА±гВТйБЄгВУгБІгВєгВ±гВЄгГ•гГЉгГЂ</div>
              <div style={{ fontSize: 12, color: subjData?.color || C.accent, marginBottom: 12 }}>{todo.text}</div>
              <div style={{ overflowY: "auto", display: "flex", flexDirection: "column", gap: 6 }}>
                {weeks.map(w => {
                  const isIn = inWeek(w.startStr);
                  const isThisWeek = w.startStr === getWeekDates(today)[0];
                  const wEndLabel = `${w.wEnd.getMonth()+1}/${w.wEnd.getDate()}`;
                  const wStartLabel = `${w.wStart.getMonth()+1}/${w.wStart.getDate()}`;
                  return (
                    <button key={w.startStr} onClick={() => {
                      if (isIn) {
                        setWeeklyPlans(ps => ps.filter(p => !(p.weekStart === w.startStr && p.todoId === todo.id)));
                      } else {
                        setWeeklyPlans(ps => [...ps, {
                          id: genId(), weekStart: w.startStr, todoId: todo.id,
                          subjectId: todo.subjectId, createdAt: Date.now(),
                        }]);
                      }
                    }} style={{
                      padding: "10px 14px", borderRadius: 8,
                      background: isIn ? C.blue : C.surfaceUp,
                      border: `1px solid ${isIn ? C.blue : C.border}`,
                      color: isIn ? "#fff" : C.text,
                      fontFamily: font, fontSize: 13, cursor: "pointer",
                      display: "flex", alignItems: "center", gap: 8,
                    }}>
                      <span style={{ flex: 1, textAlign: "left" }}>{wStartLabel}(жЬИ) гАЬ {wEndLabel}(жЧ•)</span>
                      {isThisWeek && <span style={{ fontSize: 10, opacity: 0.85 }}>дїКйА±</span>}
                      {isIn && <span>вЬУ</span>}
                    </button>
                  );
                })}
              </div>
              <button onClick={() => setWeekPickerTodo(null)}
                style={{ ...btn(false, C.textMid, { width: "100%", padding: "9px", marginTop: 12 }) }}>йЦЙгБШгВЛ</button>
            </div>
          </div>
        );
      })()}

      {/* Bulk week picker modal */}
      {bulkWeekPicker && (() => {
        const selTodos = subjectTodos.filter(t => selectedTodos.includes(t.id));
        const totalMin = selTodos.reduce((s, t) => s + (t.minutes || 0), 0);
        const fmtH = (m) => m >= 60 ? `${Math.floor(m/60)}h${m%60 ? (m%60)+"m" : ""}` : `${m}m`;
        const fmtLocal = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
        const firstOfMonth = new Date(year, month, 1);
        const firstMon = new Date(firstOfMonth);
        firstMon.setDate(firstOfMonth.getDate() - ((firstOfMonth.getDay() + 6) % 7));
        const today0 = new Date(today + "T00:00:00");
        const weeks = Array.from({ length: 10 }, (_, i) => {
          const wStart = new Date(firstMon);
          wStart.setDate(firstMon.getDate() + i * 7);
          const wEnd = new Date(wStart);
          wEnd.setDate(wStart.getDate() + 6);
          return { startStr: fmtLocal(wStart), wStart, wEnd, ended: wEnd < today0 };
        }).filter(w => !w.ended);
        return (
          <div style={{
            position: "fixed", inset: 0, background: "#0008", zIndex: 100,
            display: "flex", alignItems: "center", justifyContent: "center", padding: 20,
          }} onClick={() => setBulkWeekPicker(false)}>
            <div style={{ ...card({ maxWidth: 420, width: "100%", maxHeight: "85vh", display: "flex", flexDirection: "column" }) }} onClick={e => e.stopPropagation()}>
              <div style={{ fontFamily: serif, fontSize: 16, color: C.text, marginBottom: 4 }}>йА±гБЂгБЊгБ®гВБгБ¶ињљеК†</div>
              <div style={{ fontSize: 12, color: C.accent, marginBottom: 12 }}>
                {selTodos.length}дїґ / {fmtH(totalMin)}
              </div>
              <div style={{ overflowY: "auto", display: "flex", flexDirection: "column", gap: 6 }}>
                {weeks.map(w => {
                  const inCount = selTodos.filter(t => weeklyPlans.some(p => p.weekStart === w.startStr && p.todoId === t.id)).length;
                  const wStartLabel = `${w.wStart.getMonth()+1}/${w.wStart.getDate()}`;
                  const wEndLabel = `${w.wEnd.getMonth()+1}/${w.wEnd.getDate()}`;
                  const isThisWeek = w.startStr === getWeekDates(today)[0];
                  return (
                    <button key={w.startStr} onClick={() => {
                      const newPlans = [];
                      selTodos.forEach(t => {
                        if (!weeklyPlans.some(p => p.weekStart === w.startStr && p.todoId === t.id)) {
                          newPlans.push({
                            id: genId(), weekStart: w.startStr, todoId: t.id,
                            subjectId: t.subjectId, createdAt: Date.now() + Math.random(),
                          });
                        }
                      });
                      if (newPlans.length) setWeeklyPlans(ps => [...ps, ...newPlans]);
                    }} style={{
                      padding: "10px 14px", borderRadius: 8,
                      background: inCount === selTodos.length ? C.blue : C.surfaceUp,
                      border: `1px solid ${inCount > 0 ? C.blue : C.border}`,
                      color: inCount === selTodos.length ? "#fff" : C.text,
                      fontFamily: font, fontSize: 13, cursor: "pointer",
                      display: "flex", alignItems: "center", gap: 8,
                    }}>
                      <span style={{ flex: 1, textAlign: "left" }}>{wStartLabel}(жЬИ) гАЬ {wEndLabel}(жЧ•)</span>
                      {isThisWeek && <span style={{ fontSize: 10, opacity: 0.85 }}>дїКйА±</span>}
                      {inCount > 0 && <span style={{ fontSize: 11 }}>{inCount}/{selTodos.length}</span>}
                    </button>
                  );
                })}
              </div>
              <div style={{ display: "flex", gap: 8, marginTop: 12 }}>
                <button onClick={() => setBulkWeekPicker(false)}
                  style={{ ...btn(false, C.textMid, { flex: 1, padding: "9px" }) }}>гВ≠гГ£гГ≥гВїгГЂ</button>
                <button onClick={() => { setBulkWeekPicker(false); setSelectMode(false); setSelectedTodos([]); }}
                  style={{ ...btn(true, C.accent, { flex: 1, padding: "9px" }) }}>еЃМдЇЖ</button>
              </div>
            </div>
          </div>
        );
      })()}

    </div>
  );
}

/* вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР
   GOALS VIEW
вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР */
function GoalsView({ goals, setGoals, subjects }) {
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ title: "", deadline: addDays(todayStr(), 90), note: "", color: C.blue, subjectIds: [] });
  const [editId, setEditId] = useState(null);

  const COLORS = [C.blue, C.green, C.accent, C.purple, C.red, C.yellow];

  const saveGoal = () => {
    if (!form.title.trim()) return;
    if (editId) {
      setGoals(gs => gs.map(g => g.id === editId ? { ...g, ...form } : g));
      setEditId(null);
    } else {
      setGoals(gs => [...gs, { id: genId(), ...form }]);
    }
    setForm({ title: "", deadline: addDays(todayStr(), 90), note: "", color: C.blue, subjectIds: [] });
    setShowForm(false);
  };

  const startEditGoal = (g) => {
    setForm({ title: g.title, deadline: g.deadline, note: g.note || "", color: g.color, subjectIds: g.subjectIds || [] });
    setEditId(g.id);
    setShowForm(true);
  };

  const deleteGoal = (id) => setGoals(gs => gs.filter(g => g.id !== id));

  return (
    <div style={{ padding: 16, maxWidth: 560, margin: "0 auto", display: "flex", flexDirection: "column", gap: 14 }}>
      <div style={{ fontFamily: serif, fontSize: 18, color: C.text, textAlign: "center" }}>йХЈжЬЯгВігГЉгГЂ</div>

      {[...goals].sort((a, b) => (a.deadline || "").localeCompare(b.deadline || "")).map(g => {
        const deadline = new Date(g.deadline + "T00:00:00");
        const today = new Date();
        const daysLeft = Math.ceil((deadline - today) / 86400000);
        const linkedSubs = (g.subjectIds || []).map(id => subjects.find(s => s.id === id)).filter(Boolean);

        return (
          <div key={g.id} style={{ ...card(), borderLeft: `4px solid ${g.color}` }}>
            <div style={{ display: "flex", alignItems: "flex-start", gap: 8 }}>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 15, fontWeight: 700, color: C.text }}>{g.title}</div>
                {g.note && <div style={{ fontSize: 12, color: C.textMid, marginTop: 3 }}>{g.note}</div>}
                {linkedSubs.length > 0 && (
                  <div style={{ fontSize: 10, color: C.textMid, marginTop: 5, display: "flex", gap: 4, flexWrap: "wrap" }}>
                    {linkedSubs.map(s => (
                      <span key={s.id} style={{ color: s.color, fontWeight: 700, background: s.color + "15", padding: "1px 6px", borderRadius: 3 }}>
                        рЯУЪ {s.name}
                      </span>
                    ))}
                  </div>
                )}
              </div>
              <div style={{ textAlign: "right", flexShrink: 0 }}>
                <div style={{ fontSize: 18, fontWeight: 700, color: daysLeft < 14 ? C.red : daysLeft < 30 ? C.yellow : g.color, fontFamily: serif }}>
                  {daysLeft > 0 ? `гБВгБ®${daysLeft}жЧ•` : "жЬЯйЩРеИЗгВМ"}
                </div>
                <div style={{ fontSize: 11, color: C.textMid }}>
                  {deadline.toLocaleDateString("ja-JP", { month: "short", day: "numeric" })}гБЊгБІ
                </div>
              </div>
            </div>

            <div style={{ display: "flex", gap: 6, marginTop: 10 }}>
              <button onClick={() => startEditGoal(g)} style={{ ...btn(false, C.blue, { fontSize: 11, padding: "3px 10px" }) }}>зЈ®йЫЖ</button>
              <button onClick={() => deleteGoal(g.id)} style={{ ...btn(false, C.red, { fontSize: 11, padding: "3px 10px" }) }}>еЙКйЩ§</button>
            </div>
          </div>
        );
      })}

      <button onClick={() => setShowForm(!showForm)} style={{ ...btn(showForm, C.accent, { width: "100%", padding: "10px" }) }}>
        {showForm ? "вЬХ йЦЙгБШгВЛ" : "+ гВігГЉгГЂгВТињљеК†"}
      </button>

      {showForm && (
        <div style={card()}>
          <input style={input({ marginBottom: 10 })} placeholder="гВігГЉгГЂгВњгВ§гГИгГЂ" value={form.title} onChange={e => setForm(f => ({ ...f, title: e.target.value }))} />
          <input style={input({ marginBottom: 10 })} placeholder="гГ°гГҐгГїи©≥зі∞пЉИдїїжДПпЉЙ" value={form.note} onChange={e => setForm(f => ({ ...f, note: e.target.value }))} />
          <div style={{ marginBottom: 10 }}>
            <div style={{ fontSize: 11, color: C.textMid, marginBottom: 6 }}>жЬЯйЩР</div>
            <input type="date" style={input()} value={form.deadline} onChange={e => setForm(f => ({ ...f, deadline: e.target.value }))} />
          </div>
          <div style={{ marginBottom: 10 }}>
            <div style={{ fontSize: 11, color: C.textMid, marginBottom: 6 }}>йЦҐйА£гБЩгВЛзІСзЫЃпЉИи§ЗжХ∞йБЄжКЮеПѓгГїйБФжИРдЇИжЄђгБЂдљњзФ®пЉЙ</div>
            <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
              {subjects.map(s => {
                const selected = (form.subjectIds || []).includes(s.id);
                return (
                  <button key={s.id} onClick={() => setForm(f => ({
                    ...f,
                    subjectIds: selected
                      ? (f.subjectIds || []).filter(x => x !== s.id)
                      : [...(f.subjectIds || []), s.id]
                  }))} style={{
                    padding: "5px 10px", borderRadius: 5,
                    background: selected ? s.color : "transparent",
                    border: `1px solid ${s.color}`,
                    color: selected ? "#fff" : s.color,
                    fontFamily: font, fontSize: 11, fontWeight: 700, cursor: "pointer",
                  }}>{selected && "вЬУ "}{s.name}</button>
                );
              })}
            </div>
          </div>
          <div style={{ marginBottom: 10 }}>
            <div style={{ fontSize: 11, color: C.textMid, marginBottom: 6 }}>гВЂгГ©гГЉ</div>
            <div style={{ display: "flex", gap: 8 }}>
              {COLORS.map(c => (
                <button key={c} onClick={() => setForm(f => ({ ...f, color: c }))}
                  style={{ width: 28, height: 28, borderRadius: "50%", background: c, border: `3px solid ${form.color === c ? C.text : "transparent"}`, cursor: "pointer" }} />
              ))}
            </div>
          </div>
          <button onClick={saveGoal} style={{ ...btn(true, C.accent, { width: "100%", padding: "9px" }) }}>{editId ? "дњЭе≠Ш" : "ињљеК†"}</button>
        </div>
      )}
    </div>
  );
}

/* вХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХРвХР

async function cloudPull(email) {
  if (!email) return null;
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/dayflow_data?user_email=eq.${encodeURIComponent(email)}&select=data,updated_at`, {
      headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}` },
    });
    if (!res.ok) return null;
    const rows = await res.json();
    return rows[0] || null;
  } catch (e) { console.error("pull failed", e); return null; }
}

async function cloudPush(email, data) {
  if (!email) return false;
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/dayflow_data`, {
      method: "POST",
      headers: {
        apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}`,
        "Content-Type": "application/json",
        Prefer: "resolution=merge-duplicates",
      },
      body: JSON.stringify({ user_email: email, data, updated_at: new Date().toISOString() }),
    });
    return res.ok;
  } catch (e) { console.error("push failed", e); return false; }
}

function usePersistedState(key, initial) {
  const [state, setState] = useState(() => {
    try {
      const raw = localStorage.getItem(`${STORAGE_KEY}_${key}`);
      return raw !== null ? JSON.parse(raw) : initial;
    } catch {
      return initial;
    }
  });
  useEffect(() => {
    try {
      localStorage.setItem(`${STORAGE_KEY}_${key}`, JSON.stringify(state));
    } catch {}
  }, [key, state]);
  return [state, setState];
}

      {/* Views */}
      <div style={{ flex: 1, overflowY: "auto" }}>
        {view === "day"    && <DayView tasks={tasks} setTasks={setTasks} selectedDate={selectedDate} setSelectedDate={setSelectedDate} goals={goals} subjects={subjects} subjectTodos={subjectTodos} setSubjectTodos={setSubjectTodos} settings={settings} />}
        {view === "review" && <ReviewView tasks={tasks} setTasks={setTasks} selectedDate={selectedDate} setSelectedDate={setSelectedDate} setView={setView} subjects={subjects} subjectTodos={subjectTodos} settings={settings} goals={goals} />}
        {view === "subjects" && <SubjectsView subjects={subjects} setSubjects={setSubjects} subjectTodos={subjectTodos} setSubjectTodos={setSubjectTodos} monthlyPlans={monthlyPlans} setMonthlyPlans={setMonthlyPlans} weeklyPlans={weeklyPlans} setWeeklyPlans={setWeeklyPlans} tasks={tasks} setTasks={setTasks} selectedDate={selectedDate} goals={goals} subjectCategories={subjectCategories} setSubjectCategories={setSubjectCategories} settings={settings} />}
        {view === "week"   && <WeekView tasks={tasks} setTasks={setTasks} selectedDate={selectedDate} setSelectedDate={setSelectedDate} weeklyPlans={weeklyPlans} setWeeklyPlans={setWeeklyPlans} subjects={subjects} subjectTodos={subjectTodos} setView={setView} settings={settings} />}
        {view === "month"  && <MonthView goals={goals} monthlyPlans={monthlyPlans} setMonthlyPlans={setMonthlyPlans} weeklyPlans={weeklyPlans} setWeeklyPlans={setWeeklyPlans} subjects={subjects} subjectTodos={subjectTodos} setView={setView} selectedDate={selectedDate} tasks={tasks} settings={settings} />}
        {view === "goals"  && <GoalsView goals={goals} setGoals={setGoals} subjects={subjects} />}
      </div>

      {showSettings && <SettingsModal settings={settings} setSettings={setSettings} onClose={() => setShowSettings(false)} onReset={resetAll}
        syncEmail={syncEmail} setSyncEmail={setSyncEmail} syncStatus={syncStatus} lastSyncedAt={lastSyncedAt} manualPull={manualPull} />}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
