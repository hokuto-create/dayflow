const fmtTime = (h) => {

};

};

function getWeekDates(baseDate) {
  const d = new Date(baseDate);
  const day = d.getDay();
  const mon = new Date(d);
  mon.setDate(d.getDate() - ((day + 6) % 7));
  return Array.from({ length: 7 }, (_, i) => {
    const x = new Date(mon);
    x.setDate(mon.getDate() + i);
    return x.toISOString().split("T")[0];
  });
}

function addDays(dateStr, n) {
  const d = new Date(dateStr);
  d.setDate(d.getDate() + n);
  return d.toISOString().split("T")[0];
}

/* ── AUTO-DISTRIBUTE HELPERS ──
   Used by the subject auto-distribution (自動分配) feature. */

// Build a task title from a subject TODO. For non-CPA (material) subjects we
// prepend the subject/textbook name, matching SubjectsView.taskTitleFor.
function buildTaskTitle(todo, subjects) {
  const subj = subjects.find(s => s.id === todo.subjectId);
  if (subj && subj.category && subj.category !== "CPA勉強") {
    return `${subj.name} ${todo.text}`;
  }
  return todo.text;
}

// Active study days in [startStr, endStr] whose weekday is in `weekdays` (a Set
// of 0=Sun..6=Sat). Used by deadline-mode auto-distribution.
function activeDaysBetween(startStr, endStr, weekdays) {
  const out = [];
  let d = startStr, guard = 0;
  while (d <= endStr && guard++ < 3660) {
    if (weekdays.has(new Date(d + "T00:00:00").getDay())) out.push(d);
    d = addDays(d, 1);
  }
  return out;
}

// The k-th (0-indexed) active day on/after startStr matching `weekdays`.
// Used by hours-per-day mode where the end date is open-ended.
function nthActiveDay(startStr, weekdays, k) {
  let d = startStr, count = 0, guard = 0;
  while (guard++ < 3660) {
    if (weekdays.has(new Date(d + "T00:00:00").getDay())) {
      if (count === k) return d;
      count++;
    }
    d = addDays(d, 1);
  }
  return d;
}

/* ══════════════════════════════════════════════════════
   DAY PLANNER VIEW
══════════════════════════════════════════════════════ */
function DayView({ tasks, setTasks, selectedDate, setSelectedDate, goals, subjects, subjectTodos, setSubjectTodos, settings }) {
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ title: "", date: selectedDate, hour: 9, duration: 1, priority: "medium", note: "", goalId: "", kind: "study" });
  const [editId, setEditId] = useState(null);
  const [extraDates, setExtraDates] = useState([]); // additional dates for bulk add
  const [showBulk, setShowBulk] = useState(false);
  const [understandingModal, setUnderstandingModal] = useState(null); // task being completed
  const [scheduleModal, setScheduleModal] = useState(null); // unscheduled task to schedule
  const [hourPickerOpen, setHourPickerOpen] = useState(false); // grid picker for form's start time
  const [examplesModal, setExamplesModal] = useState(null); // task whose examples (children) to show
  const [confirmDeleteTask, setConfirmDeleteTask] = useState(null);
  const [durationEditId, setDurationEditId] = useState(null);
  const askDeleteTask = (id) => {
    if (confirmDeleteTask === id) {
      deleteTask(id);
      setConfirmDeleteTask(null);
    } else {
      setConfirmDeleteTask(id);
      setTimeout(() => setConfirmDeleteTask(cd => cd === id ? null : cd), 3000);
    }
  };

  const dayTasks = tasks.filter(t => t.date === selectedDate && t.hour != null).sort((a, b) => a.hour - b.hour);
  const unscheduledTasks = tasks.filter(t => t.date === selectedDate && t.hour == null);

  const saveTask = () => {
    if (!form.title.trim()) return;
    if (editId) {
      setTasks(ts => ts.map(t => t.id === editId ? { ...t, ...form } : t));
      setEditId(null);
    } else {
      // Bulk add: main date + extraDates
      const dates = [form.date, ...extraDates].filter((d, i, a) => a.indexOf(d) === i);
      const { date: _d, ...rest } = form;
      const newTasks = dates.map(d => ({ id: genId(), done: false, actual: null, ...rest, date: d }));
      setTasks(ts => [...ts, ...newTasks]);
    }
    setForm({ title: "", date: selectedDate, hour: 9, duration: 1, priority: "medium", note: "", goalId: "", kind: "study" });
    setExtraDates([]);
    setShowBulk(false);
    setShowForm(false);
  };

  const deleteTask = (id) => setTasks(ts => ts.filter(t => t.id !== id));

  // Days until next review based on understanding (1-4)
  const REVIEW_DAYS = { 1: 1, 2: 3, 3: 7, 4: null }; // 4=◎ no review needed

  const completeWithUnderstanding = (task, level) => {
    // Mark task done
    setTasks(ts => ts.map(t => t.id === task.id ? { ...t, done: true, understanding: level } : t));
    // Sync subject TODO
    if (task.subjectTodoId) {
      setSubjectTodos(sts => sts.map(s => s.id === task.subjectTodoId
        ? { ...s, status: "done", done: true, understanding: level } : s));
    }
    // Schedule review task if not perfect
    const days = REVIEW_DAYS[level];
    if (days && task.kind !== "other") {
      const reviewDate = addDays(task.date, days);
      const reviewTitle = task.title.startsWith("復習: ") ? task.title : `復習: ${task.title}`;
      // For review, use the underlying TODO's own minutes (likely short, e.g. 5min for an example)
      // Otherwise fall back to capping the original task duration at 1h
      let reviewDur = Math.min(task.duration, 1);
      if (task.subjectTodoId) {
        const todo = subjectTodos.find(x => x.id === task.subjectTodoId);
        if (todo && todo.minutes) {
          reviewDur = Math.max(1/60, todo.minutes / 60);
        }
      }
      setTasks(ts => [...ts, {
        id: genId(), date: reviewDate, title: reviewTitle,
        hour: null, duration: reviewDur,
        priority: level === 1 ? "high" : level === 2 ? "medium" : "low",
        actual: null, done: false, note: "", goalId: task.goalId,
        kind: "study", subjectId: task.subjectId, subjectTodoId: task.subjectTodoId,
        isReview: true, reviewOf: task.id,
      }]);
    }
    setUnderstandingModal(null);
  };

  // For a review task, derive the textbook (TX) label from its source todo.
  // Example problems (例題) are stored as children of a TX chapter and don't
  // carry the TX number in their own title, so we inherit it from the parent
  // chapter's text (e.g. "TX5-1 本支店会計" → "tx5"). Returns null for
  // non-review tasks, when no source todo is found, or when the title already
  // shows the TX number (so normal chapter reviews are left untouched).
  const reviewTxLabel = (task) => {
    if (!task.isReview || !task.subjectTodoId) return null;
    const todo = subjectTodos.find(s => s.id === task.subjectTodoId);
    if (!todo) return null;
    const source = todo.parentId ? subjectTodos.find(s => s.id === todo.parentId) : todo;
    const text = (source && source.text) || todo.text || "";
    const m = text.match(/TX\s*(\d+)/i);
    if (!m) return null;
    if (task.title.toLowerCase().includes(`tx${m[1]}`)) return null;
    return `tx${m[1]}`;
  };

  const toggleDone = (task) => {
    // If unchecking, just uncheck
    if (task.done) {
      setTasks(ts => ts.map(t => t.id === task.id ? { ...t, done: false } : t));
      return;
    }
    // If non-study, just check
    if (task.kind === "other") {
      setTasks(ts => ts.map(t => t.id === task.id ? { ...t, done: true } : t));
      return;
    }
    // Open understanding modal
    setUnderstandingModal(task);
  };

  const startEdit = (t) => {
    setForm({ title: t.title, date: t.date, hour: t.hour, duration: t.duration, priority: t.priority, note: t.note || "", goalId: t.goalId || "", kind: t.kind || "study" });
    setEditId(t.id);
    setExtraDates([]);
    setShowBulk(false);
    setShowForm(true);
  };

  const priorityColor = { high: C.red, medium: C.yellow, low: C.green };
  const priorityLabel = { high: "高", medium: "中", low: "低" };

  const startH = settings?.dayStartHour ?? 5;
  const endH = settings?.dayEndHour ?? 26;
  const hours = Array.from({ length: endH - startH }, (_, i) => i + startH);

  return (
    <div style={{ padding: 16, maxWidth: 600, margin: "0 auto" }}>
      {/* Date selector */}
      <div style={{ display: "flex", alignItems: "center", gap: 6, marginBottom: 8 }}>
        <button onClick={() => setSelectedDate(addDays(selectedDate, -7))} style={{ ...btn(), padding: "5px 8px", fontSize: 11 }}>‹‹ 1週</button>
        <button onClick={() => setSelectedDate(addDays(selectedDate, -1))} style={{ ...btn(), padding: "5px 10px" }}>‹</button>
        <div style={{ flex: 1, textAlign: "center", cursor: "pointer", position: "relative" }}
          onClick={() => document.getElementById("date-jump")?.showPicker?.()}>
          <div style={{ fontFamily: serif, fontSize: 18, color: C.text }}>
            {(() => {
              const d = new Date(selectedDate + "T00:00:00");
              const isCurYear = d.getFullYear() === new Date().getFullYear();
              return isCurYear
                ? d.toLocaleDateString("ja-JP", { month: "long", day: "numeric" })
                : d.toLocaleDateString("ja-JP", { year: "numeric", month: "long", day: "numeric" });
            })()}
          </div>
          <div style={{ fontSize: 12, color: C.textMid }}>
            {DAYS_JA[new Date(selectedDate + "T00:00:00").getDay()]}曜日
            {selectedDate === todayStr() && <span style={{ color: C.accent, marginLeft: 6 }}>• 今日</span>}
          </div>
          <input id="date-jump" type="date" value={selectedDate}
            onChange={e => e.target.value && setSelectedDate(e.target.value)}

      {/* Schedule modal for unscheduled tasks */}
      {scheduleModal && (() => {
        const t = scheduleModal;
        const subjData = t.subjectId && subjects.find(s => s.id === t.subjectId);
        // New overlap rule: any 15-min slot can hold at most 15 minutes total.
        // A task of length `dur` starting at `h` fills [h, h+dur).
        // For each 15-min slot [s, s+0.25] that overlaps the task,
        // compute the overlap from existing tasks + this task; must be <= 0.25h.
        const SLOT = 0.25;
        const overlapInSlot = (taskStart, taskEnd, slotStart) => {
          const slotEnd = slotStart + SLOT;
          const a = Math.max(taskStart, slotStart);
          const b = Math.min(taskEnd, slotEnd);
          return Math.max(0, b - a);
        };
        const isFree = (h, dur) => {
          const taskEnd = h + dur;
          // Iterate over each slot the proposed task touches
          // Use floor to nearest 15-min boundary
          const firstSlot = Math.floor(h / SLOT) * SLOT;
          for (let s = firstSlot; s < taskEnd; s += SLOT) {
            const existingInSlot = dayTasks
              .filter(x => x.id !== t.id)
              .reduce((sum, x) => sum + overlapInSlot(x.hour, x.hour + x.duration, s), 0);
            const proposedInSlot = overlapInSlot(h, taskEnd, s);
            // Use small epsilon for FP safety
            if (existingInSlot + proposedInSlot > SLOT + 0.0001) return false;
          }
          return true;
        };
        // Duration adjustment (15-min increments in UI)
        const adjustDur = (delta) => {
          const next = Math.max(0.25, Math.round((t.duration + delta) * 4) / 4);
          setTasks(ts => ts.map(x => x.id === t.id ? { ...x, duration: next } : x));
          setScheduleModal(sm => sm ? { ...sm, duration: next } : sm);
        };
        return (
          <div style={{
            position: "fixed", inset: 0, background: "#0008", zIndex: 100,
            display: "flex", alignItems: "center", justifyContent: "center", padding: 16,
          }} onClick={() => setScheduleModal(null)}>
            <div style={{
              ...card({ maxWidth: 380, width: "100%", maxHeight: "85vh", display: "flex", flexDirection: "column" })
            }} onClick={e => e.stopPropagation()}>
              <div style={{ fontSize: 13, fontWeight: 700, color: C.accent, marginBottom: 4 }}>時間を選ぶ</div>
              <div style={{ fontSize: 14, color: C.text, marginBottom: 6 }}>
                {t.isReview && <span style={{ color: C.yellow, marginRight: 4 }}>🔁</span>}{t.title}
              </div>
              {/* Duration adjuster */}
              <div style={{
                display: "flex", alignItems: "center", gap: 8,
                padding: "8px 10px", background: C.surfaceUp, borderRadius: 6, marginBottom: 10,
              }}>
                <span style={{ fontSize: 11, color: C.textMid }}>所要時間:</span>
                <button onClick={() => adjustDur(-0.25)}
                  style={{ ...btn(false, C.textMid, { padding: "4px 10px", fontSize: 14, lineHeight: 1 }) }}>−</button>
                <span style={{
                  fontSize: 13, fontWeight: 700, color: C.text,
                  minWidth: 70, textAlign: "center",
                }}>{fmtDur(t.duration)}</span>
                <button onClick={() => adjustDur(0.25)}
                  style={{ ...btn(false, C.textMid, { padding: "4px 10px", fontSize: 14, lineHeight: 1 }) }}>＋</button>
                {subjData && <span style={{ color: subjData.color, fontSize: 11, marginLeft: "auto" }}>📚 {subjData.name}</span>}
              </div>
              <div style={{ overflowY: "auto", display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 6 }}>
                {Array.from({ length: (endH - startH) * 4 }, (_, i) => startH + i * 0.25).map(h => {
                  const free = isFree(h, t.duration);
                  return (
                    <button key={h} disabled={!free}
                      onClick={() => {
                        setTasks(ts => ts.map(x => x.id === t.id ? { ...x, hour: h } : x));
                        setScheduleModal(null);
                      }}
                      style={{
                        padding: "8px 4px", borderRadius: 6,
                        background: free ? C.surfaceUp : "#f3e6e6",
                        border: `1px solid ${free ? C.border : C.red + "40"}`,
                        color: free ? C.text : C.textDim,
                        fontFamily: font, fontSize: 12, fontWeight: 600,
                        cursor: free ? "pointer" : "not-allowed",
                      }}>
                      {fmtTime(h)}
                    </button>
                  );
                })}
              </div>
              <button onClick={() => setScheduleModal(null)}
                style={{ ...btn(false, C.textMid, { width: "100%", marginTop: 12, padding: "8px" }) }}>
                キャンセル
              </button>
            </div>
          </div>
        );
      })()}

      {/* Hour picker modal for form start time (grid UI like scheduleModal) */}
      {hourPickerOpen && (() => {
        // New overlap rule: any 15-min slot can hold at most 15 min total
        const SLOT = 0.25;
        const overlapInSlot = (taskStart, taskEnd, slotStart) => {
          const slotEnd = slotStart + SLOT;
          const a = Math.max(taskStart, slotStart);
          const b = Math.min(taskEnd, slotEnd);
          return Math.max(0, b - a);
        };
        const dur = form.duration || 0.5;
        const isFree = (h) => {
          const taskEnd = h + dur;
          const firstSlot = Math.floor(h / SLOT) * SLOT;
          for (let s = firstSlot; s < taskEnd; s += SLOT) {
            const existingInSlot = dayTasks
              .filter(x => x.id !== editId)
              .reduce((sum, x) => sum + overlapInSlot(x.hour, x.hour + x.duration, s), 0);
            const proposedInSlot = overlapInSlot(h, taskEnd, s);
            if (existingInSlot + proposedInSlot > SLOT + 0.0001) return false;
          }
          return true;
        };
        return (
          <div style={{
            position: "fixed", inset: 0, background: "#0008", zIndex: 110,
            display: "flex", alignItems: "center", justifyContent: "center", padding: 16,
          }} onClick={() => setHourPickerOpen(false)}>
            <div style={{
              ...card({ maxWidth: 380, width: "100%", maxHeight: "85vh", display: "flex", flexDirection: "column" })
            }} onClick={e => e.stopPropagation()}>
              <div style={{ fontSize: 13, fontWeight: 700, color: C.accent, marginBottom: 4 }}>開始時間を選ぶ</div>
              <div style={{ fontSize: 11, color: C.textMid, marginBottom: 12 }}>
                {fmtDur(form.duration)}
              </div>
              <div style={{ overflowY: "auto", display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 6 }}>
                {Array.from({ length: (endH - startH) * 4 }, (_, i) => startH + i * 0.25).map(h => {
                  const free = isFree(h);
                  const selected = form.hour === h;
                  return (
                    <button key={h} disabled={!free}
                      onClick={() => {
                        setForm(f => ({ ...f, hour: h }));
                        setHourPickerOpen(false);
                      }}
                      style={{
                        padding: "8px 4px", borderRadius: 6,
                        background: selected ? C.accent : free ? C.surfaceUp : "#f3e6e6",
                        border: `1px solid ${selected ? C.accent : free ? C.border : C.red + "40"}`,
                        color: selected ? "#fff" : free ? C.text : C.textDim,
                        fontFamily: font, fontSize: 12, fontWeight: 600,
                        cursor: free ? "pointer" : "not-allowed",
                      }}>
                      {fmtTime(h)}
                    </button>
                  );
                })}
              </div>
              <button onClick={() => setHourPickerOpen(false)}
                style={{ ...btn(false, C.textMid, { width: "100%", marginTop: 12, padding: "8px" }) }}>
                キャンセル
              </button>
            </div>
          </div>
        );
      })()}

      {/* Examples (子TODO) modal — open when tapping a task linked to a subject TODO */}
      {examplesModal && (() => {
        const t = examplesModal;
        const parentTodo = subjectTodos.find(x => x.id === t.subjectTodoId);
        if (!parentTodo) {
          // Auto-close if parent not found
          return null;
        }
        const subjData = subjects.find(s => s.id === parentTodo.subjectId);
        const mMode = subjData && subjData.category && subjData.category !== "CPA勉強";
        const ML = mMode
          ? { unwatched: "未着手", done: "完了", progressLabel: "取り組み:" }
          : { unwatched: "未視聴", done: "視聴済", progressLabel: "動画:" };
        const children = subjectTodos.filter(x => x.parentId === parentTodo.id)
          .sort((a, b) => a.createdAt - b.createdAt);
        const setChildStatus = (id, status) => {
          setSubjectTodos(ts => ts.map(x => x.id === id ? { ...x, status, done: status === "done" } : x));
        };
        const setChildUnderstanding = (id, level) => {
          setSubjectTodos(ts => ts.map(x => x.id === id
            ? { ...x, understanding: level, status: x.status === "unwatched" ? "reviewing" : x.status }
            : x));
        };
        const setParentStatus = (status) => {
          setSubjectTodos(ts => ts.map(x => x.id === parentTodo.id ? { ...x, status, done: status === "done" } : x));
        };
        const setParentUnderstanding = (level) => {
          setSubjectTodos(ts => ts.map(x => x.id === parentTodo.id
            ? { ...x, understanding: level, status: x.status === "unwatched" ? "reviewing" : x.status }
            : x));
        };
        const pst = parentTodo.status || (parentTodo.done ? "done" : "unwatched");
        const accent = subjData?.color || C.accent;
        return (
          <div style={{
            position: "fixed", inset: 0, background: "#0008", zIndex: 110,
            display: "flex", alignItems: "flex-end", justifyContent: "center",
          }} onClick={() => setExamplesModal(null)}>
            <div style={{
              background: C.surface, borderRadius: "12px 12px 0 0",
              maxWidth: 560, width: "100%", maxHeight: "85vh", display: "flex", flexDirection: "column",
              boxShadow: "0 -4px 20px #0003",
            }} onClick={e => e.stopPropagation()}>
              {/* Header */}
              <div style={{ padding: "16px 16px 12px", borderBottom: `1px solid ${C.border}` }}>
                <div style={{ display: "flex", alignItems: "flex-start", gap: 8 }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 11, color: C.textMid, marginBottom: 2 }}>
                      {fmtTime(t.hour)}〜{fmtTime(t.hour + t.duration)}
                      {subjData && <span style={{ marginLeft: 8, color: accent, fontWeight: 700 }}>📚 {subjData.name}</span>}
                    </div>
                    <div style={{ fontSize: 16, fontWeight: 700, color: C.text }}>{parentTodo.text}</div>
                  </div>
                  <button onClick={() => setExamplesModal(null)}
                    style={{ ...btn(false, C.textMid, { padding: "4px 10px", fontSize: 12 }) }}>✕</button>
                </div>
                {/* Parent video status */}
                <div style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 10, flexWrap: "wrap" }}>
                  <span style={{ fontSize: 11, color: C.textMid }}>{ML.progressLabel}</span>
                  {[
                    ["unwatched", ML.unwatched, C.textDim],
                    ["reviewing", "復習中", C.yellow],
                    ["done", ML.done, accent],
                  ].map(([st, lbl, col]) => (
                    <button key={st} onClick={() => setParentStatus(st)}
                      style={{
                        padding: "5px 10px", borderRadius: 5,
                        background: pst === st ? col : "transparent",
                        border: `1px solid ${pst === st ? col : C.border}`,
                        color: pst === st ? "#fff" : C.textMid,
                        fontSize: 11, fontFamily: font, fontWeight: 600, cursor: "pointer",
                      }}>{lbl}</button>
                  ))}
                  {(pst === "reviewing" || pst === "done") && (
                    <div style={{ display: "flex", gap: 4, marginLeft: 4 }}>
                      {[
                        [1, "✕", C.red, "わからない"],
                        [2, "△", C.yellow, "あやふや"],
                        [3, "○", C.blue, "一応"],
                        [4, "◎", C.green, "万全"],
                      ].map(([lv, mark, col, lbl]) => (
                        <button key={lv} onClick={() => setParentUnderstanding(parentTodo.understanding === lv ? null : lv)}
                          title={lbl}
                          style={{
                            width: 28, height: 28, borderRadius: 5,
                            background: parentTodo.understanding === lv ? col : "transparent",
                            border: `1px solid ${parentTodo.understanding === lv ? col : C.border}`,
                            color: parentTodo.understanding === lv ? "#fff" : C.textDim,
                            fontSize: 12, fontWeight: 700, cursor: "pointer",
                            padding: 0, lineHeight: 1, fontFamily: font,
                          }}>{mark}</button>
                      ))}
                    </div>
                  )}
                </div>
              </div>
              {/* Children list */}
              <div style={{ overflowY: "auto", padding: 16 }}>
                {children.length === 0 ? (
                  <div style={{ padding: 20, textAlign: "center", color: C.textDim, fontSize: 12 }}>
                    この章には例題が登録されていません<br />
                    <span style={{ fontSize: 11 }}>「科目」画面から追加できます</span>
                  </div>
                ) : (
                  children.map(c => {
                    const cst = c.status || (c.done ? "done" : "unwatched");
                    const cycleC = () => {
                      const next = cst === "unwatched" ? "reviewing" : cst === "reviewing" ? "done" : "unwatched";
                      setChildStatus(c.id, next);
                    };
                    const cInfo = {
                      unwatched: { bg: "transparent", color: C.textDim, border: C.border, mark: "" },
                      reviewing: { bg: C.yellow, color: "#fff", border: C.yellow, mark: "◐" },
                      done: { bg: accent, color: "#fff", border: accent, mark: "✓" },
                    }[cst];
                    return (
                      <div key={c.id} style={{
                        padding: "10px 0", borderBottom: `1px solid ${C.border}`,
                        opacity: cst === "done" ? 0.65 : 1,
                      }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                          <button onClick={cycleC} style={{
                            width: 30, height: 30, borderRadius: "50%",
                            border: `2px solid ${cInfo.border}`, background: cInfo.bg,
                            color: cInfo.color, fontSize: 14, fontWeight: 700, cursor: "pointer",
                            flexShrink: 0, display: "flex", alignItems: "center", justifyContent: "center",
                            padding: 0,
                          }}>{cInfo.mark}</button>
                          <span style={{
                            flex: 1, fontSize: 14,
                            color: cst === "done" ? C.textMid : C.text,
                            textDecoration: cst === "done" ? "line-through" : "none",
                          }}>{c.text}</span>
                          {c.minutes ? <span style={{ fontSize: 11, color: accent, fontWeight: 600 }}>{c.minutes}m</span> : null}
                        </div>
                        {(cst === "reviewing" || cst === "done") && (
                          <div style={{ display: "flex", gap: 5, marginTop: 6, marginLeft: 40 }}>
                            {[
                              [1, "✕", C.red, "わからない"],
                              [2, "△", C.yellow, "あやふや"],
                              [3, "○", C.blue, "一応"],
                              [4, "◎", C.green, "万全"],
                            ].map(([lv, mark, col, lbl]) => (
                              <button key={lv} onClick={() => setChildUnderstanding(c.id, c.understanding === lv ? null : lv)}
                                title={lbl}
                                style={{
                                  width: 32, height: 32, borderRadius: 6,
                                  background: c.understanding === lv ? col : "transparent",
                                  border: `1px solid ${c.understanding === lv ? col : C.border}`,
                                  color: c.understanding === lv ? "#fff" : C.textDim,
                                  fontSize: 14, fontWeight: 700, cursor: "pointer",
                                  padding: 0, lineHeight: 1, fontFamily: font,
                                }}>{mark}</button>
                            ))}
                          </div>
                        )}
                      </div>
                    );
                  })
                )}
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

/* ══════════════════════════════════════════════════════
   REVIEW VIEW (振り返り)
══════════════════════════════════════════════════════ */
function ReviewView({ tasks, setTasks, selectedDate, setSelectedDate, setView, subjects, subjectTodos, settings, goals }) {
  const [reviewType, setReviewType] = useState("day"); // day | week | month
  const [memo, setMemo] = useState("");
  const [mood, setMood] = useState(null);
  const [tomorrowTheme, setTomorrowTheme] = useState("");

  const dayTasks = tasks.filter(t => t.date === selectedDate).sort((a, b) => (a.hour ?? 99) - (b.hour ?? 99));
  const done = dayTasks.filter(t => t.done);
  const notDone = dayTasks.filter(t => !t.done);

  // For a review task, derive the textbook (TX) label from its source todo.
  // Example problems (例題) are stored as children of a TX chapter and don't
  // carry the TX number in their own title, so we inherit it from the parent
  // chapter's text (e.g. "TX5-1 本支店会計" → "tx5"). Returns null for
  // non-review tasks, when no source todo is found, or when the title already
  // shows the TX number.
  const reviewTxLabel = (task) => {
    if (!task.isReview || !task.subjectTodoId) return null;
    const todo = subjectTodos.find(s => s.id === task.subjectTodoId);
    if (!todo) return null;
    const source = todo.parentId ? subjectTodos.find(s => s.id === todo.parentId) : todo;
    const text = (source && source.text) || todo.text || "";
    const m = text.match(/TX\s*(\d+)/i);
    if (!m) return null;
    if (task.title.toLowerCase().includes(`tx${m[1]}`)) return null;
    return `tx${m[1]}`;
  };
  const reviewDisplayTitle = (task) => {
    const txLabel = reviewTxLabel(task);
    if (!txLabel) return task.title;
    const PREFIX = "復習: ";
    return task.title.startsWith(PREFIX)
      ? `${PREFIX}${txLabel} ${task.title.slice(PREFIX.length)}`
      : `${txLabel} ${task.title}`;
  };
  const rate = dayTasks.length ? Math.round((done.length / dayTasks.length) * 100) : 0;

  const tomorrow = addDays(selectedDate, 1);

  const [carriedIds, setCarriedIds] = useState([]);
  const carryOver = (taskId) => {
    const t = tasks.find(x => x.id === taskId);
    if (!t) return;
    setTasks(ts => [...ts, { ...t, id: genId(), date: tomorrow, hour: null, done: false, actual: null }]);
    setCarriedIds(ids => [...ids, taskId]);
  };

  const moods = ["😫","😕","😐","🙂","😄"];

  return (
    <div style={{ padding: 16, maxWidth: 560, margin: "0 auto", display: "flex", flexDirection: "column", gap: 14 }}>
      {/* Review type tabs */}
      <div style={{ display: "flex", gap: 6 }}>
        {[
          ["day", "📅 日次"],
          ["week", "📆 週次"],
          ["month", "🗓 月次・予測"],
        ].map(([k, l]) => (
          <button key={k} onClick={() => setReviewType(k)}
            style={{ ...btn(reviewType === k, C.accent, { flex: 1, fontSize: 12, padding: "7px 4px" }) }}>
            {l}
          </button>
        ))}
      </div>

      {reviewType === "day" && <>
      {/* Date selector */}
      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
        <button onClick={() => setSelectedDate(addDays(selectedDate, -1))} style={{ ...btn(), padding: "5px 10px" }}>‹</button>
        <div style={{ flex: 1, textAlign: "center", fontFamily: serif, fontSize: 17, color: C.text, cursor: "pointer", position: "relative" }}
          onClick={() => document.getElementById("date-jump-review")?.showPicker?.()}>
          {new Date(selectedDate + "T00:00:00").toLocaleDateString("ja-JP", { month: "long", day: "numeric" })} の振り返り
          <input id="date-jump-review" type="date" value={selectedDate}
            onChange={e => e.target.value && setSelectedDate(e.target.value)}
            style={{ position: "absolute", inset: 0, opacity: 0, cursor: "pointer", border: "none" }} />
        </div>
        <button onClick={() => setSelectedDate(addDays(selectedDate, 1))} style={{ ...btn(), padding: "5px 10px" }}>›</button>
        <button onClick={() => setSelectedDate(todayStr())} style={{ ...btn(false, C.accent, { fontSize: 11, padding: "5px 9px" }) }}>今日</button>
      </div>

      {/* Stats */}
      <div style={{ ...card(), display: "flex", gap: 16 }}>
        <div style={{ flex: 1, textAlign: "center" }}>
          <div style={{ fontFamily: serif, fontSize: 32, color: rate >= 70 ? C.green : rate >= 40 ? C.yellow : C.red }}>
            {rate}%
          </div>
          <div style={{ fontSize: 11, color: C.textMid }}>達成率</div>
        </div>
        <div style={{ flex: 1, textAlign: "center" }}>
          <div style={{ fontFamily: serif, fontSize: 32, color: C.accent }}>{done.length}</div>
          <div style={{ fontSize: 11, color: C.textMid }}>完了タスク</div>
        </div>
        <div style={{ flex: 1, textAlign: "center" }}>
          <div style={{ fontFamily: serif, fontSize: 32, color: C.textMid }}>{notDone.length}</div>
          <div style={{ fontSize: 11, color: C.textMid }}>未完了</div>
        </div>
      </div>

      {/* Done tasks */}
      {done.length > 0 && (
        <div style={card()}>
          <div style={{ fontSize: 12, fontWeight: 700, color: C.green, marginBottom: 8, letterSpacing: 1 }}>✓ 完了</div>
          {done.map(t => (
            <div key={t.id} style={{ padding: "7px 0", borderBottom: `1px solid ${C.border}`, fontSize: 13, color: C.textMid, display: "flex", gap: 8 }}>
              <span style={{ color: C.green }}>✓</span> {t.title}
              <span style={{ marginLeft: "auto", fontSize: 11, color: C.textDim }}>{fmtTime(t.hour)}〜{fmtTime(t.hour + t.duration)}</span>
            </div>
          ))}
        </div>
      )}

      {/* Not done tasks with carryover */}
      {notDone.length > 0 && (
        <div style={card()}>
          <div style={{ fontSize: 12, fontWeight: 700, color: C.red, marginBottom: 8, letterSpacing: 1 }}>○ 未完了</div>
          {notDone.map(t => (
            <div key={t.id} style={{ padding: "7px 0", borderBottom: `1px solid ${C.border}`, display: "flex", alignItems: "center", gap: 8 }}>
              <span style={{ fontSize: 13, color: C.text, flex: 1 }}>{reviewDisplayTitle(t)}</span>
              {carriedIds.includes(t.id) ? (
                <span style={{ fontSize: 11, color: C.green, fontWeight: 700, padding: "3px 9px" }}>✓ 繰越済</span>
              ) : (
                <button onClick={() => carryOver(t.id)} style={{ ...btn(false, C.accent, { fontSize: 11, padding: "3px 9px" }) }}>
                  翌日に繰越 →
                </button>
              )}
            </div>
          ))}
        </div>
      )}

      {/* Mood */}
      <div style={card()}>
        <div style={{ fontSize: 12, fontWeight: 700, color: C.textMid, marginBottom: 10 }}>今日の気分</div>
        <div style={{ display: "flex", gap: 8, justifyContent: "center" }}>
          {moods.map((m, i) => (
            <button key={i} onClick={() => setMood(i)}
              style={{ fontSize: 26, background: "none", border: `2px solid ${mood === i ? C.accent : "transparent"}`, borderRadius: 10, cursor: "pointer", padding: "4px 8px", opacity: mood !== null && mood !== i ? 0.4 : 1 }}>
              {m}
            </button>
          ))}
        </div>
      </div>

      {/* Memo */}
      <div style={card()}>
        <div style={{ fontSize: 12, fontWeight: 700, color: C.textMid, marginBottom: 8 }}>一言メモ</div>
        <textarea style={{ ...input(), minHeight: 70, resize: "vertical", lineHeight: 1.6 }}
          placeholder="今日の気づきや反省を記録…"
          value={memo} onChange={e => setMemo(e.target.value)} />
      </div>

      {/* Tomorrow theme */}
      <div style={card()}>
        <div style={{ fontSize: 12, fontWeight: 700, color: C.accent, marginBottom: 8 }}>明日の集中テーマ</div>
        <input style={input()} placeholder="例：Webアプリの設計を固める"
          value={tomorrowTheme} onChange={e => setTomorrowTheme(e.target.value)} />
        <button onClick={() => { setSelectedDate(tomorrow); setView("day"); }} style={{ ...btn(true, C.accent, { width: "100%", marginTop: 10, padding: "9px" }) }}>
          明日の計画を立てる →
        </button>
      </div>
      </>}

      {reviewType === "week" && (() => {
        const weekDates = getWeekDates(selectedDate);
        const weekTasks = tasks.filter(t => weekDates.includes(t.date));
        const weekDone = weekTasks.filter(t => t.done);
        const weekStudy = weekDone.filter(t => t.kind !== "other");
        const weekRate = weekTasks.length ? Math.round(weekDone.length / weekTasks.length * 100) : 0;
        const totalHours = weekStudy.reduce((s, t) => s + (t.duration || 0), 0);
        // By subject
        const bySubject = {};
        weekStudy.forEach(t => {
          if (!t.subjectId) return;
          bySubject[t.subjectId] = (bySubject[t.subjectId] || 0) + (t.duration || 0);
        });
        // Daily breakdown
        const dailyHours = weekDates.map(d => {
          const dayDone = tasks.filter(t => t.date === d && t.done && t.kind !== "other");
          return dayDone.reduce((s, t) => s + (t.duration || 0), 0);
        });
        const maxDaily = Math.max(...dailyHours, 1);
        return (
          <>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <button onClick={() => setSelectedDate(addDays(selectedDate, -7))} style={{ ...btn(), padding: "5px 10px" }}>‹</button>
              <div style={{ flex: 1, textAlign: "center", fontFamily: serif, fontSize: 15, color: C.text }}>
                {weekDates[0].slice(5).replace("-", "/")} 〜 {weekDates[6].slice(5).replace("-", "/")}
              </div>
              <button onClick={() => setSelectedDate(addDays(selectedDate, 7))} style={{ ...btn(), padding: "5px 10px" }}>›</button>
              <button onClick={() => setSelectedDate(todayStr())} style={{ ...btn(false, C.accent, { fontSize: 11, padding: "5px 9px" }) }}>今週</button>
            </div>
            <div style={{ ...card(), display: "flex", gap: 16 }}>
              <div style={{ flex: 1, textAlign: "center" }}>
                <div style={{ fontFamily: serif, fontSize: 28, color: weekRate >= 70 ? C.green : weekRate >= 40 ? C.yellow : C.red }}>{weekRate}%</div>
                <div style={{ fontSize: 10, color: C.textMid }}>達成率</div>
              </div>
              <div style={{ flex: 1, textAlign: "center" }}>
                <div style={{ fontFamily: serif, fontSize: 28, color: C.accent }}>{totalHours.toFixed(1)}h</div>
                <div style={{ fontSize: 10, color: C.textMid }}>勉強時間</div>
              </div>
              <div style={{ flex: 1, textAlign: "center" }}>
                <div style={{ fontFamily: serif, fontSize: 28, color: C.text }}>{weekDone.length}</div>
                <div style={{ fontSize: 10, color: C.textMid }}>完了タスク</div>
              </div>
            </div>
            {/* Daily bar chart */}
            <div style={card()}>
              <div style={{ fontSize: 12, fontWeight: 700, color: C.textMid, marginBottom: 10 }}>日別の勉強時間</div>
              <div style={{ display: "flex", alignItems: "flex-end", gap: 4, height: 100 }}>
                {weekDates.map((d, i) => (
                  <div key={d} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 4 }}>
                    <div style={{ flex: 1, width: "100%", display: "flex", alignItems: "flex-end" }}>
                      <div style={{
                        width: "100%", borderRadius: 4,
                        background: dailyHours[i] > 0 ? C.accent : C.border,
                        height: `${(dailyHours[i] / maxDaily) * 100}%`,
                        minHeight: dailyHours[i] > 0 ? 4 : 1,
                      }} />
                    </div>
                    <div style={{ fontSize: 9, color: C.textDim }}>{DAYS_JA[new Date(d + "T00:00:00").getDay()]}</div>
                    <div style={{ fontSize: 9, color: C.textMid }}>{dailyHours[i] > 0 ? dailyHours[i].toFixed(1) : "-"}</div>
                  </div>
                ))}
              </div>
            </div>
            {/* By subject */}
            {Object.keys(bySubject).length > 0 && (
              <div style={card()}>
                <div style={{ fontSize: 12, fontWeight: 700, color: C.textMid, marginBottom: 10 }}>科目別の勉強時間</div>
                {subjects.filter(s => bySubject[s.id]).sort((a, b) => bySubject[b.id] - bySubject[a.id]).map(s => {
                  const h = bySubject[s.id];
                  const pct = (h / totalHours) * 100;
                  return (
                    <div key={s.id} style={{ marginBottom: 8 }}>
                      <div style={{ display: "flex", fontSize: 12, color: C.text, marginBottom: 2 }}>
                        <span style={{ flex: 1 }}>{s.name}</span>
                        <span style={{ color: s.color, fontWeight: 700 }}>{h.toFixed(1)}h</span>
                      </div>
                      <div style={{ height: 6, background: C.border, borderRadius: 3, overflow: "hidden" }}>
                        <div style={{ width: `${pct}%`, height: "100%", background: s.color }} />
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </>
        );
      })()}

      {reviewType === "month" && (() => {
        // Month tasks
        const monthKey = selectedDate.slice(0, 7);
        const monthTasks = tasks.filter(t => t.date.startsWith(monthKey));
        const monthDone = monthTasks.filter(t => t.done);
        const monthStudy = monthDone.filter(t => t.kind !== "other");
        const monthRate = monthTasks.length ? Math.round(monthDone.length / monthTasks.length * 100) : 0;
        const monthHours = monthStudy.reduce((s, t) => s + (t.duration || 0), 0);

        // Subject progress / goal forecast
        const subjectStats = subjects.map(s => {
          const todos = subjectTodos.filter(t => t.subjectId === s.id);
          const totalMin = todos.reduce((sum, t) => sum + (t.minutes || 0), 0);
          const watchedTodos = todos.filter(t => {
            const st = t.status || (t.done ? "done" : "unwatched");
            return st === "done" || st === "reviewing";
          });
          const watchedMin = watchedTodos.reduce((sum, t) => sum + (t.minutes || 0), 0);
          const remainMin = Math.max(0, totalMin - watchedMin);
          return { subject: s, totalMin, watchedMin, remainMin, totalCount: todos.length, watchedCount: watchedTodos.length };
        }).filter(x => x.totalMin > 0);

        // Forecast per goal
        const last14 = Array.from({ length: 14 }, (_, i) => addDays(todayStr(), -i));
        const today0 = new Date(); today0.setHours(0, 0, 0, 0);
        const goalForecasts = (goals || []).filter(g => g.deadline && (g.subjectIds || []).length > 0).map(g => {
          const [yy, mm, dd] = g.deadline.split("-").map(Number);
          const deadline = new Date(yy, mm - 1, dd);
          const daysLeft = Math.ceil((deadline - today0) / 86400000);
          // Sum remaining for linked subjects
          const linkedStats = subjectStats.filter(x => (g.subjectIds || []).includes(x.subject.id));
          const remainMin = linkedStats.reduce((s, x) => s + x.remainMin, 0);
          // Pace from recent tasks belonging to linked subjects
          const recent = tasks.filter(t => last14.includes(t.date) && t.done && t.kind !== "other"
            && t.subjectId && (g.subjectIds || []).includes(t.subjectId));
          const recentMin = recent.reduce((s, t) => s + (t.duration || 0) * 60, 0);
          const dailyPaceMin = recentMin / 14;
          const requiredDailyMin = daysLeft > 0 ? remainMin / daysLeft : 0;
          const willFinish = dailyPaceMin >= requiredDailyMin;
          return { goal: g, daysLeft, remainMin, dailyPaceMin, requiredDailyMin, willFinish, linkedStats };
        }).filter(f => f.daysLeft > 0).sort((a, b) => a.daysLeft - b.daysLeft);

        return (
          <>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <button onClick={() => {
                const [yy, mm] = selectedDate.split("-").map(Number);
                const d = new Date(yy, mm - 2, 1);
                setSelectedDate(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-01`);
              }} style={{ ...btn(), padding: "5px 10px" }}>‹</button>
              <div style={{ flex: 1, textAlign: "center", fontFamily: serif, fontSize: 16, color: C.text }}>
                {monthKey.replace("-", "年")}月
              </div>
              <button onClick={() => {
                const [yy, mm] = selectedDate.split("-").map(Number);
                const d = new Date(yy, mm, 1);
                setSelectedDate(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-01`);
              }} style={{ ...btn(), padding: "5px 10px" }}>›</button>
              <button onClick={() => setSelectedDate(todayStr())} style={{ ...btn(false, C.accent, { fontSize: 11, padding: "5px 9px" }) }}>今月</button>
            </div>
            <div style={{ ...card(), display: "flex", gap: 16 }}>
              <div style={{ flex: 1, textAlign: "center" }}>
                <div style={{ fontFamily: serif, fontSize: 28, color: monthRate >= 70 ? C.green : monthRate >= 40 ? C.yellow : C.red }}>{monthRate}%</div>
                <div style={{ fontSize: 10, color: C.textMid }}>達成率</div>
              </div>
              <div style={{ flex: 1, textAlign: "center" }}>
                <div style={{ fontFamily: serif, fontSize: 28, color: C.accent }}>{monthHours.toFixed(0)}h</div>
                <div style={{ fontSize: 10, color: C.textMid }}>勉強時間</div>
              </div>
              <div style={{ flex: 1, textAlign: "center" }}>
                <div style={{ fontFamily: serif, fontSize: 28, color: C.text }}>{monthDone.length}</div>
                <div style={{ fontSize: 10, color: C.textMid }}>完了タスク</div>
              </div>
            </div>

            {/* Per-goal forecasts */}
            {goalForecasts.length === 0 ? (
              <div style={{ ...card(), textAlign: "center", padding: 16, fontSize: 12, color: C.textMid }}>
                ゴール画面で「関連する科目」を設定すると、ゴールごとの達成予測が表示されます
              </div>
            ) : goalForecasts.map(f => (
              <div key={f.goal.id} style={{ ...card(), borderLeft: `4px solid ${f.willFinish ? C.green : C.red}` }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: C.textMid, marginBottom: 4, display: "flex", alignItems: "center", gap: 6 }}>
                  <span style={{ width: 10, height: 10, borderRadius: "50%", background: f.goal.color, display: "inline-block" }} />
                  <span style={{ flex: 1 }}>{f.goal.title}</span>
                  <span style={{ color: f.daysLeft < 30 ? C.red : C.textMid }}>あと {f.daysLeft} 日</span>
                </div>
                <div style={{ fontSize: 10, color: C.textDim, marginBottom: 8, display: "flex", gap: 4, flexWrap: "wrap" }}>
                  {f.linkedStats.map(x => (
                    <span key={x.subject.id} style={{ color: x.subject.color }}>📚 {x.subject.name}</span>
                  ))}
                </div>
                <div style={{ display: "flex", gap: 12, marginBottom: 10 }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 10, color: C.textMid }}>直近14日の平均</div>
                    <div style={{ fontSize: 18, fontFamily: serif, color: C.text }}>
                      {(f.dailyPaceMin / 60).toFixed(1)}h<span style={{ fontSize: 10, color: C.textMid }}>/日</span>
                    </div>
                  </div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 10, color: C.textMid }}>必要ペース</div>
                    <div style={{ fontSize: 18, fontFamily: serif, color: f.willFinish ? C.green : C.red }}>
                      {(f.requiredDailyMin / 60).toFixed(1)}h<span style={{ fontSize: 10, color: C.textMid }}>/日</span>
                    </div>
                  </div>
                </div>
                <div style={{ fontSize: 12, color: f.willFinish ? C.green : C.red, fontWeight: 700 }}>
                  {f.remainMin === 0
                    ? `✓ 達成済み！`
                    : f.willFinish
                      ? `✓ このペースなら間に合う見込み（残り${(f.remainMin/60).toFixed(0)}h）`
                      : `⚠ ペース不足（残り${(f.remainMin/60).toFixed(0)}h / 不足${((f.requiredDailyMin - f.dailyPaceMin)/60).toFixed(1)}h/日）`}
                </div>
              </div>
            ))}

            {/* Subject progress */}
            {subjectStats.length > 0 && (
              <div style={card()}>
                <div style={{ fontSize: 12, fontWeight: 700, color: C.textMid, marginBottom: 10 }}>科目別の視聴進捗</div>
                {subjectStats.map(x => {
                  const pct = x.totalMin ? (x.watchedMin / x.totalMin) * 100 : 0;
                  return (
                    <div key={x.subject.id} style={{ marginBottom: 10 }}>
                      <div style={{ display: "flex", fontSize: 12, color: C.text, marginBottom: 3 }}>
                        <span style={{ flex: 1 }}>{x.subject.name}</span>
                        <span style={{ color: x.subject.color, fontWeight: 700 }}>{Math.round(pct)}%</span>
                      </div>
                      <div style={{ height: 6, background: C.border, borderRadius: 3, overflow: "hidden" }}>
                        <div style={{ width: `${pct}%`, height: "100%", background: x.subject.color }} />
                      </div>
                      <div style={{ fontSize: 10, color: C.textMid, marginTop: 2 }}>
                        {(x.watchedMin/60).toFixed(1)}h 完了 / 残 {(x.remainMin/60).toFixed(1)}h
                      </div>
                    </div>
                  );
                })}
              </div>
            )}
          </>
        );
      })()}
    </div>
  );
}
