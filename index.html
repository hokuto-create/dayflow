async function cloudPull(email) {
  if (!email) return null;
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/dayflow_data?user_email=eq.${encodeURIComponent(email)}&select=data,updated_at`, {
      headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}` },
    });
    if (!res.ok) return null;
    const rows = await res.json();
    return rows[0] || null;
  } catch (e) { console.error("pull failed", e); return null; }
}

async function cloudPush(email, data) {
  if (!email) return false;
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/dayflow_data`, {
      method: "POST",
      headers: {
        apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}`,
        "Content-Type": "application/json",
        Prefer: "resolution=merge-duplicates",
      },
      body: JSON.stringify({ user_email: email, data, updated_at: new Date().toISOString() }),
    });
    return res.ok;
  } catch (e) { console.error("push failed", e); return false; }
}

function usePersistedState(key, initial) {
  const [state, setState] = useState(() => {
    try {
      const raw = localStorage.getItem(`${STORAGE_KEY}_${key}`);
      return raw !== null ? JSON.parse(raw) : initial;
    } catch {
      return initial;
    }
  });
  useEffect(() => {
    try {
      localStorage.setItem(`${STORAGE_KEY}_${key}`, JSON.stringify(state));
    } catch {}
  }, [key, state]);
  return [state, setState];
}

function App() {
  const today = todayStr();
  const [view, setView] = useState("day");
  const [selectedDate, setSelectedDate] = useState(today);

  // When the app resumes (e.g. PWA reopened next day), reset selected date to today
  useEffect(() => {
    const checkAndReset = () => {
      const now = todayStr();
      setSelectedDate(prev => prev !== now ? now : prev);
    };
    const onVisible = () => { if (!document.hidden) checkAndReset(); };
    document.addEventListener("visibilitychange", onVisible);
    window.addEventListener("focus", checkAndReset);
    return () => {
      document.removeEventListener("visibilitychange", onVisible);
      window.removeEventListener("focus", checkAndReset);
    };
  }, []);
  const [tasks, setTasks] = usePersistedState("tasks", makeSampleTasks(today));
  const [goals, setGoals] = usePersistedState("goals", SAMPLE_GOALS);
  const [subjects, setSubjects] = usePersistedState("subjects", SAMPLE_SUBJECTS);
  const [subjectCategories, setSubjectCategories] = usePersistedState("subjectCategories", ["CPA勉強"]);
  const [subjectTodos, setSubjectTodos] = usePersistedState("subjectTodos", SAMPLE_SUBJECT_TODOS);
  const [monthlyPlans, setMonthlyPlans] = usePersistedState("monthlyPlans", []);
  const [weeklyPlans, setWeeklyPlans] = usePersistedState("weeklyPlans", []);
  const [settings, setSettings] = usePersistedState("settings", { dayStartHour: 5, dayEndHour: 26, examDate: "", examLabel: "短答", scheduleMode: "auto", chunkBoundary: true });
  const [syncEmail, setSyncEmail] = usePersistedState("syncEmail", "");
  const [syncStatus, setSyncStatus] = useState("idle"); // idle | syncing | synced | error
  const [lastSyncedAt, setLastSyncedAt] = useState(0);
  const [showSettings, setShowSettings] = useState(false);
  const initialPulledRef = useRef(false);
  const lastPushedDataRef = useRef("");

  // Pull from cloud on initial load if email is set
  useEffect(() => {
    if (!syncEmail || initialPulledRef.current) return;
    initialPulledRef.current = true;
    setSyncStatus("syncing");
    cloudPull(syncEmail).then(row => {
      if (row && row.data) {
        const d = row.data;
        // Handle legacy multi-workspace format by flattening from ws_cpa
        const src = (d.workspaces && d.data) ? (d.data.ws_cpa || {}) : d;
        if (src.tasks) setTasks(src.tasks);
        if (src.goals) setGoals(src.goals);
        if (src.subjects) setSubjects(src.subjects);
        if (src.subjectTodos) setSubjectTodos(src.subjectTodos);
        if (src.monthlyPlans) setMonthlyPlans(src.monthlyPlans);
        if (src.weeklyPlans) setWeeklyPlans(src.weeklyPlans);
        if (src.settings) setSettings(src.settings);
        if (src.subjectCategories) setSubjectCategories(src.subjectCategories);
        setLastSyncedAt(Date.now());
      }
      setSyncStatus("synced");
    });
  }, [syncEmail]);

  // Push to cloud (debounced 3s) when data changes
  useEffect(() => {
    if (!syncEmail || !initialPulledRef.current) return;
    const payload = { tasks, goals, subjects, subjectTodos, monthlyPlans, weeklyPlans, settings, subjectCategories };
    const serialized = JSON.stringify(payload);
    if (serialized === lastPushedDataRef.current) return;
    const timer = setTimeout(() => {
      setSyncStatus("syncing");
      cloudPush(syncEmail, payload).then(ok => {
        if (ok) {
          lastPushedDataRef.current = serialized;
          setLastSyncedAt(Date.now());
          setSyncStatus("synced");
        } else {
          setSyncStatus("error");
        }
      });
    }, 3000);
    return () => clearTimeout(timer);
  }, [syncEmail, tasks, goals, subjects, subjectTodos, monthlyPlans, weeklyPlans, settings, subjectCategories]);

  // Manual pull
  const manualPull = async () => {
    if (!syncEmail) return;
    setSyncStatus("syncing");
    const row = await cloudPull(syncEmail);
    if (row && row.data) {
      const d = row.data;
      const src = (d.workspaces && d.data) ? (d.data.ws_cpa || {}) : d;
      if (src.tasks) setTasks(src.tasks);
      if (src.goals) setGoals(src.goals);
      if (src.subjects) setSubjects(src.subjects);
      if (src.subjectTodos) setSubjectTodos(src.subjectTodos);
      if (src.monthlyPlans) setMonthlyPlans(src.monthlyPlans);
      if (src.weeklyPlans) setWeeklyPlans(src.weeklyPlans);
      if (src.settings) setSettings(src.settings);
      if (src.subjectCategories) setSubjectCategories(src.subjectCategories);
      lastPushedDataRef.current = JSON.stringify(src);
      setLastSyncedAt(Date.now());
      setSyncStatus("synced");
    } else {
      setSyncStatus("synced");
    }
  };

  const resetAll = () => {
    const keysToRemove = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith(`${STORAGE_KEY}_`)) keysToRemove.push(k);
    }
    keysToRemove.forEach(k => { try { localStorage.removeItem(k); } catch {} });
    location.reload();
  };

  return (
    <div style={{ background: C.bg, minHeight: "100vh", color: C.text, fontFamily: font, display: "flex", flexDirection: "column" }}>
      {/* Header */}
      <div style={{
        display: "flex", alignItems: "center", padding: "12px 16px",
        background: C.surface, borderBottom: `1px solid ${C.border}`,
        gap: 10,
      }}>
        <div style={{ fontFamily: serif, fontSize: 20, color: C.accent, letterSpacing: 1 }}>DayFlow</div>
        {settings.examDate && (() => {
          const [yy, mm, dd] = settings.examDate.split("-").map(Number);
          const exam = new Date(yy, mm - 1, dd);
          const today0 = new Date();
          today0.setHours(0, 0, 0, 0);
          const days = Math.ceil((exam - today0) / 86400000);
          if (days < 0) return null;
          const urgent = days <= 30;
          return (
            <div onClick={() => setShowSettings(true)} style={{
              padding: "4px 10px", borderRadius: 12,
              background: urgent ? C.red + "22" : C.accent + "18",
              border: `1px solid ${urgent ? C.red + "60" : C.accent + "50"}`,
              cursor: "pointer",
              display: "flex", alignItems: "baseline", gap: 4,
            }}>
              <span style={{ fontSize: 9, color: urgent ? C.red : C.accent, fontWeight: 700 }}>
                {settings.examLabel || "試験"}
              </span>
              <span style={{ fontSize: 14, color: urgent ? C.red : C.accent, fontWeight: 800, fontFamily: serif }}>
                {days === 0 ? "今日" : `あと${days}日`}
              </span>
            </div>
          );
        })()}
        <div style={{ flex: 1 }} />
        {syncEmail && (
          <div onClick={() => setShowSettings(true)} title={syncStatus}
            style={{ fontSize: 14, cursor: "pointer", padding: "2px 6px" }}>
            {syncStatus === "syncing" ? "⟳" : syncStatus === "synced" ? "✓" : syncStatus === "error" ? "⚠" : "☁"}
          </div>
        )}
        <button onClick={() => setShowSettings(true)} style={{ ...btn(false, C.textMid, { padding: "5px 10px", fontSize: 14 }) }}>⚙</button>
      </div>

      <Nav view={view} setView={setView} />

      {/* Views */}
      <div style={{ flex: 1, overflowY: "auto" }}>
        {view === "day"    && <DayView tasks={tasks} setTasks={setTasks} selectedDate={selectedDate} setSelectedDate={setSelectedDate} goals={goals} subjects={subjects} subjectTodos={subjectTodos} setSubjectTodos={setSubjectTodos} settings={settings} />}
        {view === "review" && <ReviewView tasks={tasks} setTasks={setTasks} selectedDate={selectedDate} setSelectedDate={setSelectedDate} setView={setView} subjects={subjects} subjectTodos={subjectTodos} settings={settings} goals={goals} />}
        {view === "subjects" && <SubjectsView subjects={subjects} setSubjects={setSubjects} subjectTodos={subjectTodos} setSubjectTodos={setSubjectTodos} monthlyPlans={monthlyPlans} setMonthlyPlans={setMonthlyPlans} weeklyPlans={weeklyPlans} setWeeklyPlans={setWeeklyPlans} tasks={tasks} setTasks={setTasks} selectedDate={selectedDate} goals={goals} subjectCategories={subjectCategories} setSubjectCategories={setSubjectCategories} settings={settings} />}
        {view === "week"   && <WeekView tasks={tasks} setTasks={setTasks} selectedDate={selectedDate} setSelectedDate={setSelectedDate} weeklyPlans={weeklyPlans} setWeeklyPlans={setWeeklyPlans} subjects={subjects} subjectTodos={subjectTodos} setView={setView} settings={settings} />}
        {view === "month"  && <MonthView goals={goals} monthlyPlans={monthlyPlans} setMonthlyPlans={setMonthlyPlans} weeklyPlans={weeklyPlans} setWeeklyPlans={setWeeklyPlans} subjects={subjects} subjectTodos={subjectTodos} setView={setView} selectedDate={selectedDate} tasks={tasks} settings={settings} />}
        {view === "goals"  && <GoalsView goals={goals} setGoals={setGoals} subjects={subjects} />}
      </div>

      {showSettings && <SettingsModal settings={settings} setSettings={setSettings} onClose={() => setShowSettings(false)} onReset={resetAll}
        syncEmail={syncEmail} setSyncEmail={setSyncEmail} syncStatus={syncStatus} lastSyncedAt={lastSyncedAt} manualPull={manualPull} />}
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
